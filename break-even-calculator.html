<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Break Even Calculator | Find Your Break Even Point</title><meta name="description" content="Free break even calculator. Calculate how many units you need to sell to cover costs and start making profit."><meta name="keywords" content="break even calculator, break even point, break even analysis, business calculator"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/break-even-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#14b8a6 0%,#0d9488 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-teal-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Break Even Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Break Even Calculator</h1><p class="text-gray-500 mb-6">Find out how many units you need to sell to cover your costs.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Fixed Costs ($)</label><input type="number" id="fixedCosts" placeholder="10000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Variable Cost per Unit ($)</label><input type="number" id="variableCost" placeholder="5" min="0" step="0.01" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Selling Price per Unit ($)</label><input type="number" id="price" placeholder="15" min="0" step="0.01" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Break Even</button></form></div>
<div id="results" class="hidden"><div class="bg-teal-50 border-2 border-teal-500 rounded-xl p-6 mb-6"><h3 class="font-bold text-teal-800 mb-2">Break Even Point</h3><p id="units" class="text-4xl font-bold text-teal-600">0 units</p><p id="revenue" class="text-lg text-gray-600 mt-2">$0 in revenue</p></div>
<div class="grid md:grid-cols-3 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Fixed Costs</p><p id="fixed" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Contribution Margin</p><p id="margin" class="text-xl font-bold text-teal-600">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Profit at 2x</p><p id="profit2x" class="text-xl font-bold text-green-600">$0</p></div></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Break Even Analysis</h3><div id="analysis" class="text-gray-600"></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const fixedCosts=parseFloat(document.getElementById('fixedCosts').value)||0;const variableCost=parseFloat(document.getElementById('variableCost').value)||0;const price=parseFloat(document.getElementById('price').value)||0;if(price<=variableCost){alert('Selling price must be higher than variable cost!');return;}const contributionMargin=price-variableCost;const breakEvenUnits=Math.ceil(fixedCosts/contributionMargin);const breakEvenRevenue=breakEvenUnits*price;const profitAt2x=(breakEvenUnits*2*price)-(fixedCosts+(breakEvenUnits*2*variableCost));document.getElementById('results').classList.remove('hidden');document.getElementById('units').textContent=breakEvenUnits.toLocaleString()+' units';document.getElementById('revenue').textContent='$'+breakEvenRevenue.toLocaleString()+' in revenue';document.getElementById('fixed').textContent='$'+fixedCosts.toLocaleString();document.getElementById('margin').textContent='$'+contributionMargin.toFixed(2);document.getElementById('profit2x').textContent='$'+profitAt2x.toLocaleString();document.getElementById('analysis').innerHTML=`<p class="mb-2">Your contribution margin is <strong>$${contributionMargin.toFixed(2)}</strong> per unit (${((contributionMargin/price)*100).toFixed(0)}% margin).</p><p class="mb-2">You need to sell <strong>${breakEvenUnits.toLocaleString()} units</strong> to cover your fixed costs.</p><p>Each additional unit sold beyond break even generates <strong>$${contributionMargin.toFixed(2)} profit</strong>.</p>`;document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
