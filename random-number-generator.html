<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Random Number Generator | Pick a Number</title><meta name="description" content="Free random number generator. Generate random numbers, pick lottery numbers, and create random lists."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/random-number-generator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#6366f1 0%,#4f46e5 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-indigo-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Random Number Generator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Random Number Generator</h1>
<div class="space-y-6"><div><label class="block text-gray-700 font-semibold mb-1">Minimum</label><input type="number" id="min" value="1" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><div><label class="block text-gray-700 font-semibold mb-1">Maximum</label><input type="number" id="max" value="100" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><div><label class="block text-gray-700 font-semibold mb-1">How many numbers?</label><input type="number" id="count" value="1" min="1" max="100" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><div><label class="flex items-center space-x-2"><input type="checkbox" id="unique" class="w-4 h-4"><span class="text-gray-700">Unique numbers only</span></label></div><button id="generate" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Generate Random Numbers</button></div>
</div>
<div id="results" class="hidden"><div class="bg-indigo-50 border-2 border-indigo-500 rounded-xl p-8 mb-6 text-center"><p class="text-gray-600 mb-2">Your random number(s):</p><p id="numbers" class="text-5xl font-bold text-indigo-600"></p></div>
<div class="flex gap-4 mb-6"><button id="copy" class="flex-1 bg-gray-100 text-gray-700 font-bold py-3 rounded-lg hover:bg-gray-200 transition">Copy</button><button id="reset" class="flex-1 bg-gray-100 text-gray-700 font-bold py-3 rounded-lg hover:bg-gray-200 transition">Generate Again</button></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Quick Pick</h3><div class="grid grid-cols-2 md:grid-cols-4 gap-2"><button class="quick-btn p-2 bg-gray-100 rounded hover:bg-indigo-100 transition" data-min="1" data-max="10">1-10</button><button class="quick-btn p-2 bg-gray-100 rounded hover:bg-indigo-100 transition" data-min="1" data-max="100">1-100</button><button class="quick-btn p-2 bg-gray-100 rounded hover:bg-indigo-100 transition" data-min="1" data-max="1000">1-1000</button><button class="quick-btn p-2 bg-gray-100 rounded hover:bg-indigo-100 transition" data-min="1" data-max="49" data-count="6">Lottery 6/49</button><button class="quick-btn p-2 bg-gray-100 rounded hover:bg-indigo-100 transition" data-min="1" data-max="59" data-count="5">Powerball</button><button class="quick-btn p-2 bg-gray-100 rounded hover:bg-indigo-100 transition" data-min="1" data-max="6" data-count="2">Dice</button></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>function generate(){const min=parseInt(document.getElementById('min').value)||0;const max=parseInt(document.getElementById('max').value)||100;const count=parseInt(document.getElementById('count').value)||1;const unique=document.getElementById('unique').checked;const numbers=[];while(numbers.length<count){const num=Math.floor(Math.random()*(max-min+1))+min;if(unique&&numbers.includes(num))continue;numbers.push(num);}document.getElementById('results').classList.remove('hidden');document.getElementById('numbers').textContent=numbers.join(', ');document.getElementById('results').scrollIntoView({behavior:'smooth'});}document.getElementById('generate').addEventListener('click',generate);document.getElementById('reset').addEventListener('click',generate);document.getElementById('copy').addEventListener('click',function(){navigator.clipboard.writeText(document.getElementById('numbers').textContent);this.textContent='Copied!';setTimeout(()=>{this.textContent='Copy';},2000);});document.querySelectorAll('.quick-btn').forEach(btn=>{btn.addEventListener('click',function(){document.getElementById('min').value=this.dataset.min;document.getElementById('max').value=this.dataset.max;if(this.dataset.count)document.getElementById('count').value=this.dataset.count;if(this.dataset.count)document.getElementById('unique').checked=true;generate();});});</script>
</body></html>
