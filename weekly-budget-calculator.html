<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const income=parseFloat(document.getElementById('income').value)||0;const rent=parseFloat(document.getElementById('rent').value)||0;const food=parseFloat(document.getElementById('food').value)||0;const transport=parseFloat(document.getElementById('transport').value)||0;const utilities=parseFloat(document.getElementById('utilities').value)||0;const entertainment=parseFloat(document.getElementById('entertainment').value)||0;const other=parseFloat(document.getElementById('other').value)||0;const totalExpenses=rent+food+transport+utilities+entertainment+other;const balance=income-totalExpenses;const daily=balance/7;document.getElementById('results').classList.remove('hidden');document.getElementById('balance').textContent=(balance>=0?'+':'')+'$'+Math.abs(Math.round(balance)).toLocaleString();document.getElementById('balance').className='text-4xl font-bold '+(balance>=0?'text-blue-600':'text-red-600');document.getElementById('status').textContent=balance>=0?'Great! You\'re within budget.':'Budget deficit - reduce expenses.';document.getElementById('totalIncome').textContent='$'+income.toLocaleString();document.getElementById('totalExpenses').textContent='$'+Math.round(totalExpenses).toLocaleString();document.getElementById('daily').textContent='$'+daily.toFixed(2);const expenses=[{name:'Housing',amt:rent},{name:'Food',amt:food},{name:'Transport',amt:transport},{name:'Utilities',amt:utilities},{name:'Entertainment',amt:entertainment},{name:'Other',amt:other}].filter(e=>e.amt>0);document.getElementById('breakdown').innerHTML=expenses.map(e=>'<div class="flex justify-between py-1 border-b"><span>'+e.name+'</span><span class="font-bold">$'+e.amt.toLocaleString()+'</span></div>').join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
