<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Future Value Calculator | FV of Investment</title><meta name="description" content="Free future value calculator. Calculate the future value of your investments."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/future-value-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#10b981 0%,#059669 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-green-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Future Value Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Future Value Calculator</h1><p class="text-gray-500 mb-6">Calculate the future value of your investments.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Present Value ($)</label><input type="number" id="present" placeholder="10000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Interest Rate (%)</label><input type="number" id="rate" placeholder="6" min="0" max="50" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Years</label><input type="number" id="years" placeholder="10" min="1" max="50" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div></div><div><label class="block text-gray-700 font-semibold mb-1">Compounding</label><select id="compound" class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white"><option value="1">Annually</option><option value="4" selected>Quarterly</option><option value="12">Monthly</option><option value="365">Daily</option></select></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Future Value</button></form></div>
<div id="results" class="hidden"><div class="bg-green-50 border-2 border-green-500 rounded-xl p-6 mb-6 text-center"><h3 class="font-bold text-green-800 mb-2">Future Value</h3><p id="future" class="text-4xl font-bold text-green-600">$0</p></div>
<div class="grid md:grid-cols-3 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Principal</p><p id="principalDisplay" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Interest Earned</p><p id="interest" class="text-xl font-bold text-green-600">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Growth</p><p id="growth" class="text-xl font-bold">0x</p></div></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Growth Over Time</h3><div id="chart" class="space-y-2"></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2026 Finance Calculators Hub</p></div></footer>
<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const present=parseFloat(document.getElementById('present').value)||0;const rate=parseFloat(document.getElementById('rate').value)/100||0;const years=parseInt(document.getElementById('years').value)||10;const n=parseInt(document.getElementById('compound').value)||4;const future=present*Math.pow(1+rate/n,years*n);const interest=future-present;const growth=future/present;document.getElementById('results').classList.remove('hidden');document.getElementById('future').textContent='$'+Math.round(future).toLocaleString();document.getElementById('principalDisplay').textContent='$'+present.toLocaleString();document.getElementById('interest').textContent='$'+Math.round(interest).toLocaleString();document.getElementById('growth').textContent=growth.toFixed(1)+'x';const yearly=[];for(let y=0;y<=years;y++){const fv=present*Math.pow(1+rate/n,y*n);yearly.push({year:y,fv:Math.round(fv)});}document.getElementById('chart').innerHTML=yearly.filter(y=>y.year%Math.ceil(years/5)===0||y.year===years).map(y=>'<div class="flex justify-between py-1 border-b"><span>Year '+y.year+'</span><span class="font-bold">$'+y.fv.toLocaleString()+'</span></div>').join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
