<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Amortization Comparison</h1><p class="text-gray-500 mb-6">Compare different loan terms and interest rates side by side.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Loan Amount ($)</label><input type="number" id="principal" placeholder="200000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div class="grid md:grid-cols-2 gap-4"><div class="bg-gray-50 p-4 rounded-lg"><h4 class="font-bold text-gray-700 mb-3">Option A</h4><div><label class="block text-gray-600 text-sm mb-1">Rate (%)</label><input type="number" id="rateA" placeholder="6.5" min="0" max="20" step="0.1" class="w-full px-3 py-2 border border-gray-300 rounded-lg" required></div><div class="mt-2"><label class="block text-gray-600 text-sm mb-1">Term (years)</label><input type="number" id="termA" placeholder="30" min="1" max="40" class="w-full px-3 py-2 border border-gray-300 rounded-lg" required></div></div><div class="bg-gray-50 p-4 rounded-lg"><h4 class="font-bold text-gray-700 mb-3">Option B</h4><div><label class="block text-gray-600 text-sm mb-1">Rate (%)</label><input type="number" id="rateB" placeholder="5.5" min="0" max="20" step="0.1" class="w-full px-3 py-2 border border-gray-300 rounded-lg" required></div><div class="mt-2"><label class="block text-gray-600 text-sm mb-1">Term (years)</label><input type="number" id="termB" placeholder="30" min="1" max="40" class="w-full px-3 py-2 border border-gray-300 rounded-lg" required></div></div></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Compare Loans</button></form></div>

<script>function calculate(principal,rate,term){const monthlyRate=rate/100/12;const n=term*12;const payment=principal*monthlyRate/(1-Math.pow(1+monthlyRate,-n));const total=payment*n;const interest=total-principal;return{payment,total,interest,term};}document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const principal=parseFloat(document.getElementById('principal').value)||0;const rateA=parseFloat(document.getElementById('rateA').value)||0;const termA=parseInt(document.getElementById('termA').value)||30;const rateB=parseFloat(document.getElementById('rateB').value)||0;const termB=parseInt(document.getElementById('termB').value)||30;const loanA=calculate(principal,rateA,termA);const loanB=calculate(principal,rateB,termB);document.getElementById('results').classList.remove('hidden');document.getElementById('paymentA').textContent='$'+loanA.payment.toFixed(2)+'/mo';document.getElementById('totalA').textContent='$'+Math.round(loanA.total).toLocaleString()+' total';document.getElementById('interestA').textContent='$'+Math.round(loanA.interest).toLocaleString()+' interest';document.getElementById('paymentB').textContent='$'+loanB.payment.toFixed(2)+'/mo';document.getElementById('totalB').textContent='$'+Math.round(loanB.total).toLocaleString()+' total';document.getElementById('interestB').textContent='$'+Math.round(loanB.interest).toLocaleString()+' interest';const savings=loanA.total-loanB.total;const better=savings>0?'B':'A';document.getElementById('comparison').innerHTML='<div class="flex justify-between py-1 border-b"><span>Monthly Payment</span><span>$'+loanA.payment.toFixed(2)+' vs $'+loanB.payment.toFixed(2)+'</span></div>'+'<div class="flex justify-between py-1 border-b"><span>Total Interest</span><span>$'+Math.round(loanA.interest).toLocaleString()+' vs $'+Math.round(loanB.interest).toLocaleString()+'</span></div>'+'<div class="flex justify-between py-1 border-b"><span>Total Cost</span><span>$'+Math.round(loanA.total).toLocaleString()+' vs $'+Math.round(loanB.total).toLocaleString()+'</span></div>'+'<div class="flex justify-between py-1 font-bold"><span>Savings with Option '+better+'</span><span class="'+(savings>0?'text-green-600':'text-red-600')+'">$'+Math.abs(Math.round(savings)).toLocaleString()+'</span></div>';document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
