<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Emergency Fund Calculator | How Much to Save</title><meta name="description" content="Free emergency fund calculator. Calculate how much you need for emergencies."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/emergency-fund-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-red-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Emergency Fund Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Emergency Fund Calculator</h1><p class="text-gray-500 mb-6">Calculate how much you need for emergencies.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Monthly Expenses ($)</label><input type="number" id="expenses" placeholder="4000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Months of Coverage</label><select id="months" class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white"><option value="3">3 months (minimum)</option><option value="6" selected>6 months (recommended)</option><option value="9">9 months</option><option value="12">12 months (conservative)</option></select></div><div><label class="block text-gray-700 font-semibold mb-1">Current Savings ($)</label><input type="number" id="savings" placeholder="5000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Emergency Fund</button></form></div>
<div id="results" class="hidden"><div class="bg-red-50 border-2 border-red-500 rounded-xl p-6 mb-6 text-center"><h3 class="font-bold text-red-800 mb-2">Recommended Emergency Fund</h3><p id="target" class="text-4xl font-bold text-red-600">$0</p><p id="coverage" class="text-red-700 mt-2"></p></div>
<div class="grid md:grid-cols-2 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4"><p class="text-gray-500 text-sm">Current Savings</p><p id="current" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4"><p class="text-gray-500 text-sm">Still Need</p><p id="needed" class="text-xl font-bold text-red-600">$0</p></div></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Savings Plan</h3><div id="plan" class="space-y-2"></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2026 Finance Calculators Hub</p></div></footer>
<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const expenses=parseFloat(document.getElementById('expenses').value)||0;const months=parseInt(document.getElementById('months').value)||6;const savings=parseFloat(document.getElementById('savings').value)||0;const target=expenses*months;const needed=Math.max(0,target-savings);document.getElementById('results').classList.remove('hidden');document.getElementById('target').textContent='$'+target.toLocaleString();document.getElementById('coverage').textContent=months+' months of expenses';document.getElementById('current').textContent='$'+savings.toLocaleString();document.getElementById('needed').textContent=needed>0?'$'+needed.toLocaleString():'✓ Fully funded!';document.getElementById('needed').className=needed>0?'text-xl font-bold text-red-600':'text-xl font-bold text-green-600';const plans=[{label:'Aggressive (24 months)',months:24},{label:'Moderate (36 months)',months:36},{label:'Slow (60 months)',months:60}];document.getElementById('plan').innerHTML=plans.map(p=>{const monthly=needed/p.months;return'<div class="flex justify-between py-1"><span>'+p.label+'</span><span class="font-bold">$'+Math.round(monthly).toLocaleString()+'/mo</span></div>';}).join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
