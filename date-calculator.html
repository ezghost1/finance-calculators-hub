<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Date Calculator | Date Difference & Add/Subtract Days</title><meta name="description" content="Free date calculator. Calculate the difference between dates, add or subtract days, and find business days."><meta name="keywords" content="date calculator, days between dates, date difference, add days, business days"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/date-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#8b5cf6 0%,#7c3aed 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-purple-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Date Calculator</span></nav>
<h1 class="text-2xl font-bold text-gray-800 mb-6">Date Calculator</h1>
<div class="grid md:grid-cols-2 gap-6 mb-8">
<div class="bg-white rounded-xl shadow-lg p-6"><h2 class="font-bold text-gray-800 mb-4">Days Between Dates</h2><form id="calc1" class="space-y-3"><div><label class="block text-gray-700 font-semibold mb-1">Start Date</label><input type="date" id="start1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">End Date</label><input type="date" id="end1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><button type="submit" class="w-full gradient-bg text-white font-bold py-3 rounded-lg hover:opacity-90 transition">Calculate</button></form><div id="r1" class="mt-4 text-lg font-semibold text-purple-600"></div></div>
<div class="bg-white rounded-xl shadow-lg p-6"><h2 class="font-bold text-gray-800 mb-4">Add/Subtract Days</h2><form id="calc2" class="space-y-3"><div><label class="block text-gray-700 font-semibold mb-1">Start Date</label><input type="date" id="start2" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Days</label><input type="number" id="days" placeholder="30" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div class="flex gap-2"><button type="button" onclick="setOp('add')" id="btn-add" class="flex-1 py-2 bg-purple-600 text-white rounded-lg">Add</button><button type="button" onclick="setOp('sub')" id="btn-sub" class="flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg">Subtract</button></div><button type="submit" class="w-full gradient-bg text-white font-bold py-3 rounded-lg hover:opacity-90 transition mt-2">Calculate</button></form><div id="r2" class="mt-4 text-lg font-semibold text-purple-600"></div></div>
</div>
<div class="bg-white rounded-xl shadow-lg p-6"><h2 class="font-bold text-gray-800 mb-4">Business Days Calculator</h2><form id="calc3" class="space-y-3"><div class="grid md:grid-cols-2 gap-3"><div><label class="block text-gray-700 font-semibold mb-1">Start Date</label><input type="date" id="start3" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Business Days</label><input type="number" id="bdays" placeholder="10" min="1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div></div><button type="submit" class="w-full gradient-bg text-white font-bold py-3 rounded-lg hover:opacity-90 transition">Calculate End Date</button></form><div id="r3" class="mt-4 text-lg font-semibold text-purple-600"></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2026 Finance Calculators Hub</p></div></footer>
<script>let op='add';function setOp(o){op=o;document.getElementById('btn-add').className='flex-1 py-2 '+(o==='add'?'bg-purple-600 text-white':'bg-gray-200 text-gray-700')+' rounded-lg';document.getElementById('btn-sub').className='flex-1 py-2 '+(o==='sub'?'bg-purple-600 text-white':'bg-gray-200 text-gray-700')+' rounded-lg';}document.getElementById('calc1').addEventListener('submit',function(e){e.preventDefault();const start=new Date(document.getElementById('start1').value);const end=new Date(document.getElementById('end1').value);const days=Math.ceil((end-start)/(1000*60*60*24));const weeks=Math.floor(days/7);const remaining=days%7;document.getElementById('r1').textContent=days+' days ('+weeks+' weeks, '+remaining+' days)';});document.getElementById('calc2').addEventListener('submit',function(e){e.preventDefault();const start=new Date(document.getElementById('start2').value);const days=parseInt(document.getElementById('days').value);const result=new Date(start);result.setDate(result.getDate()+(op==='add'?days:-days));document.getElementById('r2').textContent=result.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});});document.getElementById('calc3').addEventListener('submit',function(e){e.preventDefault();let date=new Date(document.getElementById('start3').value);let remaining=parseInt(document.getElementById('bdays').value);while(remaining>0){date.setDate(date.getDate()+1);const day=date.getDay();if(day!==0&&day!==6)remaining--;}document.getElementById('r3').textContent=date.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});});</script>
</body></html>
