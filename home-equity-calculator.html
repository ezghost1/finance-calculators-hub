<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Home Equity Calculator | Equity & LTV</title><meta name="description" content="Free home equity calculator. Calculate your home equity and loan-to-value ratio."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/home-equity-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#3b82f6 0%,#1d4ed8 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-blue-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Home Equity Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Home Equity Calculator</h1><p class="text-gray-500 mb-6">Calculate your home equity and loan-to-value ratio.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Current Home Value ($)</label><input type="number" id="value" placeholder="400000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Mortgage Balance ($)</label><input type="number" id="mortgage" placeholder="250000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Other Liens/Loans ($)</label><input type="number" id="liens" placeholder="0" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg"><p class="text-gray-400 text-xs mt-1">HELOC, second mortgage, etc.</p></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Equity</button></form></div>
<div id="results" class="hidden"><div class="bg-blue-50 border-2 border-blue-500 rounded-xl p-6 mb-6 text-center"><h3 class="font-bold text-blue-800 mb-2">Your Home Equity</h3><p id="equity" class="text-4xl font-bold text-blue-600">$0</p><p id="equityPct" class="text-blue-700 mt-2"></p></div>
<div class="grid md:grid-cols-2 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4"><p class="text-gray-500 text-sm">Loan-to-Value (LTV)</p><p id="ltv" class="text-xl font-bold">0%</p><p id="ltvStatus" class="text-sm"></p></div><div class="bg-white rounded-xl shadow p-4"><p class="text-gray-500 text-sm">Combined LTV</p><p id="cltv" class="text-xl font-bold">0%</p><p id="cltvStatus" class="text-sm"></p></div></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Equity Insights</h3><div id="insights" class="space-y-2"></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const value=parseFloat(document.getElementById('value').value)||0;const mortgage=parseFloat(document.getElementById('mortgage').value)||0;const liens=parseFloat(document.getElementById('liens').value)||0;const equity=value-mortgage-liens;const equityPct=(equity/value)*100;const ltv=(mortgage/value)*100;const cltv=((mortgage+liens)/value)*100;document.getElementById('results').classList.remove('hidden');document.getElementById('equity').textContent='$'+Math.round(equity).toLocaleString();document.getElementById('equityPct').textContent=equityPct.toFixed(1)+'% of home value';document.getElementById('ltv').textContent=ltv.toFixed(1)+'%';document.getElementById('cltv').textContent=cltv.toFixed(1)+'%';let ltvStatus,ltvClass;if(ltv<=80){ltvStatus='Good - Under 80%';ltvClass='text-green-600';}else if(ltv<=90){ltvStatus='Fair - 80-90%';ltvClass='text-yellow-600';}else{ltvStatus='High - Over 90%';ltvClass='text-red-600';}document.getElementById('ltvStatus').textContent=ltvStatus;document.getElementById('ltvStatus').className='text-sm '+ltvClass;let cltvStatus,cltvClass;if(cltv<=80){cltvStatus='Good - Under 80%';cltvClass='text-green-600';}else if(cltv<=90){cltvStatus='Fair - 80-90%';cltvClass='text-yellow-600';}else{cltvStatus='High - Over 90%';cltvClass='text-red-600';}document.getElementById('cltvStatus').textContent=cltvStatus;document.getElementById('cltvStatus').className='text-sm '+cltvClass;const insights=[];if(equity>0){insights.push('✓ You have positive equity in your home');}if(ltv<=80){insights.push('✓ LTV under 80% - no PMI required');insights.push('✓ Good candidate for HELOC or cash-out refinance');}else{insights.push('⚠ LTV over 80% - PMI may be required');}if(equity>=value*0.2){insights.push('✓ 20%+ equity - good for refinancing');}document.getElementById('insights').innerHTML=insights.map(i=>'<p class="'+(i.startsWith('✓')?'text-green-600':'text-yellow-600')+'">'+i+'</p>').join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
