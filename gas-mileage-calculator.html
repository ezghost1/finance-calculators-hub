<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gas Mileage Calculator | MPG Calculator</title><meta name="description" content="Free gas mileage calculator. Calculate your car's MPG and fuel efficiency."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/gas-mileage-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-green-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Gas Mileage Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Gas Mileage Calculator (MPG)</h1><p class="text-gray-500 mb-6">Calculate your vehicle's fuel efficiency.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Distance Traveled (miles)</label><input type="number" id="miles" placeholder="300" min="0" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Fuel Used (gallons)</label><input type="number" id="gallons" placeholder="10" min="0" step="0.01" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Price per Gallon ($)</label><input type="number" id="price" placeholder="4.50" min="0" step="0.01" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate MPG</button></form></div>
<div id="results" class="hidden"><div class="bg-green-50 border-2 border-green-500 rounded-xl p-6 mb-6 text-center"><h3 class="font-bold text-green-800 mb-2">Your MPG</h3><p id="mpg" class="text-5xl font-bold text-green-600">0</p><p class="text-green-700">miles per gallon</p></div>
<div class="grid md:grid-cols-3 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Cost per Mile</p><p id="costPerMile" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Cost per 100 Miles</p><p id="costPer100" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Annual Cost</p><p id="annualCost" class="text-xl font-bold">$0</p></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2026 Finance Calculators Hub</p></div></footer>
<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const miles=parseFloat(document.getElementById('miles').value)||0;const gallons=parseFloat(document.getElementById('gallons').value)||0;const price=parseFloat(document.getElementById('price').value)||0;if(gallons<=0){alert('Please enter fuel used');return;}const mpg=miles/gallons;const costPerMile=price/gallons;const costPer100=costPerMile*100;const annualCost=costPerMile*12000;document.getElementById('results').classList.remove('hidden');document.getElementById('mpg').textContent=mpg.toFixed(1);document.getElementById('costPerMile').textContent='$'+costPerMile.toFixed(3);document.getElementById('costPer100').textContent='$'+costPer100.toFixed(2);document.getElementById('annualCost').textContent='$'+Math.round(annualCost).toLocaleString();document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
