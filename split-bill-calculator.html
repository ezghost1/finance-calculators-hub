<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Split Bill Calculator | Divide Expenses Easily</title><meta name="description" content="Free split bill calculator. Divide restaurant bills, rent, and expenses fairly among multiple people."><meta name="keywords" content="split bill calculator, bill splitter, divide expenses, shared bills"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/split-bill-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#f97316 0%,#ea580c 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-orange-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Split Bill Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Split Bill Calculator</h1><form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Total Bill ($)</label><input type="number" id="total" placeholder="120" min="0" step="0.01" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Number of People</label><input type="number" id="people" placeholder="4" min="1" max="100" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Tip Percentage (%)</label><div class="flex gap-2"><button type="button" onclick="setTip(0)" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">0%</button><button type="button" onclick="setTip(15)" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">15%</button><button type="button" onclick="setTip(18)" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">18%</button><button type="button" onclick="setTip(20)" class="px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600">20%</button></div><input type="number" id="tip" placeholder="20" min="0" max="100" class="w-full px-4 py-3 border border-gray-300 rounded-lg mt-2" required></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Split Bill</button></form></div>
<div id="results" class="hidden"><div class="bg-orange-50 border-2 border-orange-500 rounded-xl p-6 mb-6"><h3 class="font-bold text-orange-800 mb-2">Each Person Pays</h3><p id="per-person" class="text-4xl font-bold text-orange-600">$0</p></div><div class="grid md:grid-cols-3 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Subtotal</p><p id="subtotal" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Tip Amount</p><p id="tip-amount" class="text-xl font-bold text-green-600">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Total</p><p id="grand-total" class="text-xl font-bold">$0</p></div></div><div class="bg-white rounded-xl shadow p-6"><h2 class="font-bold text-gray-800 mb-4">Breakdown</h2><div id="breakdown" class="space-y-2"></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>function setTip(pct){document.getElementById('tip').value=pct;}document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const total=parseFloat(document.getElementById('total').value)||0;const people=parseInt(document.getElementById('people').value)||1;const tip=parseFloat(document.getElementById('tip').value)||0;const tipAmount=total*tip/100;const grandTotal=total+tipAmount;const perPerson=grandTotal/people;document.getElementById('results').classList.remove('hidden');document.getElementById('per-person').textContent='$'+perPerson.toFixed(2);document.getElementById('subtotal').textContent='$'+total.toFixed(2);document.getElementById('tip-amount').textContent='$'+tipAmount.toFixed(2);document.getElementById('grand-total').textContent='$'+grandTotal.toFixed(2);let breakdown='';for(let i=1;i<=Math.min(people,10);i++){breakdown+='<div class="flex justify-between py-2 border-b"><span class="text-gray-600">Person '+i+'</span><span class="font-semibold">$'+perPerson.toFixed(2)+'</span></div>';}if(people>10)breakdown+='<div class="text-gray-500 text-sm mt-2">...and '+(people-10)+' more people</div>';document.getElementById('breakdown').innerHTML=breakdown;document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
