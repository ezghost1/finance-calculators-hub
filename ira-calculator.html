<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>IRA Calculator | Traditional vs Roth IRA</title><meta name="description" content="Free IRA calculator. Compare Traditional vs Roth IRA. Calculate retirement savings and tax advantages."><meta name="keywords" content="IRA calculator, Roth IRA, Traditional IRA, retirement account, IRA contribution"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/ira-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#8b5cf6 0%,#7c3aed 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-purple-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">IRA Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">IRA Calculator</h1><p class="text-gray-600 mb-4">Compare Traditional vs Roth IRA and see how your retirement savings grow.</p>
<div class="grid md:grid-cols-2 gap-4 mb-6"><button onclick="setType('traditional')" id="btn-trad" class="p-4 bg-purple-100 border-2 border-purple-500 rounded-lg text-center"><div class="font-bold text-purple-800">Traditional IRA</div><div class="text-sm text-purple-600">Tax deduction now, pay taxes later</div></button><button onclick="setType('roth')" id="btn-roth" class="p-4 bg-gray-100 border-2 border-gray-300 rounded-lg text-center"><div class="font-bold text-gray-700">Roth IRA</div><div class="text-sm text-gray-500">Pay taxes now, tax-free later</div></button></div>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Annual Contribution ($)</label><input type="number" id="contribution" placeholder="7000" min="0" max="23000" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Current Age</label><input type="number" id="age" placeholder="30" min="18" max="80" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Retirement Age</label><input type="number" id="retireAge" placeholder="65" min="50" max="80" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Expected Return (%)</label><input type="number" id="rate" placeholder="7" min="0" max="15" step="0.5" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><div><label class="block text-gray-700 font-semibold mb-1">Current Tax Bracket (%)</label><input type="number" id="taxBracket" placeholder="22" min="0" max="50" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><div><label class="block text-gray-700 font-semibold mb-1">Expected Retirement Tax Bracket (%)</label><input type="number" id="retireTaxBracket" placeholder="12" min="0" max="50" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate</button></form></div>
<div id="results" class="hidden"><div class="bg-purple-50 border-2 border-purple-500 rounded-xl p-6 mb-6"><h3 class="font-bold text-purple-800 mb-2">At Retirement</h3><p id="total" class="text-4xl font-bold text-purple-600">$0</p><p id="afterTax" class="text-purple-700 mt-2"></p></div><div class="grid md:grid-cols-3 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Total Contributions</p><p id="contributions" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Total Growth</p><p id="growth" class="text-xl font-bold text-green-600">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Tax Savings</p><p id="taxSavings" class="text-xl font-bold text-blue-600">$0</p></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>let type='traditional';function setType(t){type=t;document.getElementById('btn-trad').className='p-4 rounded-lg text-center border-2 '+(t==='traditional'?'bg-purple-100 border-purple-500':'bg-gray-100 border-gray-300');document.getElementById('btn-roth').className='p-4 rounded-lg text-center border-2 '+(t==='roth'?'bg-purple-100 border-purple-500':'bg-gray-100 border-gray-300');}document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const contribution=parseFloat(document.getElementById('contribution').value)||0;const age=parseInt(document.getElementById('age').value)||30;const retireAge=parseInt(document.getElementById('retireAge').value)||65;const rate=parseFloat(document.getElementById('rate').value)/100||0.07;const taxBracket=parseFloat(document.getElementById('taxBracket').value)/100||0.22;const retireTaxBracket=parseFloat(document.getElementById('retireTaxBracket').value)/100||0.12;const years=retireAge-age;const months=years*12;const monthlyRate=rate/12;let balance=0;for(let i=0;i<months;i++){balance=balance*(1+monthlyRate)+contribution/12;}const totalContributions=contribution*years;const totalGrowth=balance-totalContributions;let afterTaxBalance,taxSavings;if(type==='traditional'){afterTaxBalance=balance*(1-retireTaxBracket);taxSavings=contribution*years*taxBracket;}else{afterTaxBalance=balance;taxSavings=0;}document.getElementById('results').classList.remove('hidden');document.getElementById('total').textContent='$'+Math.round(balance).toLocaleString();document.getElementById('afterTax').textContent=type==='traditional'?'After-tax value: $'+Math.round(afterTaxBalance).toLocaleString():'All withdrawals are tax-free!';document.getElementById('contributions').textContent='$'+Math.round(totalContributions).toLocaleString();document.getElementById('growth').textContent='$'+Math.round(totalGrowth).toLocaleString();document.getElementById('taxSavings').textContent=type==='traditional'?'$'+Math.round(taxSavings).toLocaleString()+' deduction saved':'Tax-free growth';document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
