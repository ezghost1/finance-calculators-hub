<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Net Worth Calculator | Calculate Your Wealth</title><meta name="description" content="Free net worth calculator. Calculate your total assets minus liabilities. Track your financial progress."><meta name="keywords" content="net worth calculator, wealth calculator, assets calculator, financial worth"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/net-worth-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#8b5cf6 0%,#7c3aed 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-4xl"><nav class="mb-4 text-sm"><a href="/" class="text-purple-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Net Worth Calculator</span></nav>
<h1 class="text-2xl font-bold text-gray-800 mb-6">Net Worth Calculator</h1>
<div class="grid md:grid-cols-2 gap-6"><div class="bg-white rounded-xl shadow-lg p-6"><h2 class="font-bold text-gray-800 mb-4 text-green-600">Assets</h2><form id="assets-form" class="space-y-3"><input type="number" id="cash" placeholder="Cash & Bank Accounts" class="w-full px-4 py-2 border rounded-lg"><input type="number" id="investments" placeholder="Investments (Stocks, Bonds)" class="w-full px-4 py-2 border rounded-lg"><input type="number" id="retirement" placeholder="Retirement Accounts (401k, IRA)" class="w-full px-4 py-2 border rounded-lg"><input type="number" id="realestate" placeholder="Real Estate Value" class="w-full px-4 py-2 border rounded-lg"><input type="number" id="vehicles" placeholder="Vehicles" class="w-full px-4 py-2 border rounded-lg"><input type="number" id="other-assets" placeholder="Other Assets" class="w-full px-4 py-2 border rounded-lg"><div class="bg-green-50 p-3 rounded-lg"><span class="text-gray-600">Total Assets:</span> <span id="total-assets" class="font-bold text-green-600">$0</span></div></form></div>
<div class="bg-white rounded-xl shadow-lg p-6"><h2 class="font-bold text-gray-800 mb-4 text-red-600">Liabilities</h2><form id="liabilities-form" class="space-y-3"><input type="number" id="mortgage" placeholder="Mortgage" class="w-full px-4 py-2 border rounded-lg"><input type="number" id="student-loans" placeholder="Student Loans" class="w-full px-4 py-2 border rounded-lg"><input type="number" id="car-loans" placeholder="Car Loans" class="w-full px-4 py-2 border rounded-lg"><input type="number" id="credit-cards" placeholder="Credit Card Debt" class="w-full px-4 py-2 border rounded-lg"><input type="number" id="other-debt" placeholder="Other Debts" class="w-full px-4 py-2 border rounded-lg"><div class="bg-red-50 p-3 rounded-lg"><span class="text-gray-600">Total Liabilities:</span> <span id="total-liabilities" class="font-bold text-red-600">$0</span></div></form></div></div>
<button id="calculate" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition mt-6">Calculate Net Worth</button>
<div id="results" class="hidden mt-6"><div class="bg-purple-50 border-2 border-purple-500 rounded-xl p-6 text-center"><h3 class="font-bold text-purple-800 mb-2">Your Net Worth</h3><p id="net-worth" class="text-5xl font-bold text-purple-600">$0</p><p id="status" class="text-purple-700 mt-2"></p></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2026 Finance Calculators Hub</p></div></footer>
<script>const inputs=document.querySelectorAll('input[type="number"]');inputs.forEach(i=>{i.addEventListener('input',calculateTotals);});function calculateTotals(){const assets=['cash','investments','retirement','realestate','vehicles','other-assets'].reduce((s,id)=>s+(parseFloat(document.getElementById(id).value)||0),0);const liabilities=['mortgage','student-loans','car-loans','credit-cards','other-debt'].reduce((s,id)=>s+(parseFloat(document.getElementById(id).value)||0),0);document.getElementById('total-assets').textContent='$'+assets.toLocaleString();document.getElementById('total-liabilities').textContent='$'+liabilities.toLocaleString();}document.getElementById('calculate').addEventListener('click',function(){const assets=['cash','investments','retirement','realestate','vehicles','other-assets'].reduce((s,id)=>s+(parseFloat(document.getElementById(id).value)||0),0);const liabilities=['mortgage','student-loans','car-loans','credit-cards','other-debt'].reduce((s,id)=>s+(parseFloat(document.getElementById(id).value)||0),0);const netWorth=assets-liabilities;document.getElementById('results').classList.remove('hidden');document.getElementById('net-worth').textContent='$'+netWorth.toLocaleString();document.getElementById('net-worth').className='text-5xl font-bold '+(netWorth>=0?'text-green-600':'text-red-600');document.getElementById('status').textContent=netWorth>=0?'Positive net worth - great job!':'Negative net worth - work on reducing debt';document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
