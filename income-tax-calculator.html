<script>const brackets2024={single:[{min:0,max:11600,rate:0.10},{min:11600,max:47150,rate:0.12},{min:47150,max:100525,rate:0.22},{min:100525,max:191950,rate:0.24},{min:191950,max:243725,rate:0.32},{min:243725,max:609350,rate:0.35},{min:609350,max:Infinity,rate:0.37}],married:[{min:0,max:23200,rate:0.10},{min:23200,max:94300,rate:0.12},{min:94300,max:201050,rate:0.22},{min:201050,max:383900,rate:0.24},{min:383900,max:487450,rate:0.32},{min:487450,max:731200,rate:0.35},{min:731200,max:Infinity,rate:0.37}],marriedSeparate:[{min:0,max:11600,rate:0.10},{min:11600,max:47150,rate:0.12},{min:47150,max:100525,rate:0.22},{min:100525,max:191950,rate:0.24},{min:191950,max:243725,rate:0.32},{min:243725,max:365600,rate:0.35},{min:365600,max:Infinity,rate:0.37}],head:[{min:0,max:16550,rate:0.10},{min:16550,max:63100,rate:0.12},{min:63100,max:100500,rate:0.22},{min:100500,max:191950,rate:0.24},{min:191950,max:243700,rate:0.32},{min:243700,max:609350,rate:0.35},{min:609350,max:Infinity,rate:0.37}]};document.getElementById('status').addEventListener('change',function(){const d={single:'14600',married:'29200',marriedSeparate:'14600',head:'21900'};document.getElementById('deduction').value=d[this.value];});document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const income=parseFloat(document.getElementById('income').value)||0;const status=document.getElementById('status').value;const deduction=parseFloat(document.getElementById('deduction').value)||0;const taxable=Math.max(0,income-deduction);const bracket=brackets2024[status];let tax=0;let remaining=taxable;for(const b of bracket){if(remaining<=0)break;const taxableInBracket=Math.min(remaining,b.max-b.min);tax+=taxableInBracket*b.rate;remaining-=taxableInBracket;}const effective=tax/income;const takeHome=income-tax;document.getElementById('results').classList.remove('hidden');document.getElementById('tax').textContent='$'+Math.round(tax).toLocaleString();document.getElementById('rate').textContent='Effective tax rate: '+(effective*100).toFixed(1)+'%';document.getElementById('taxable').textContent='$'+Math.round(taxable).toLocaleString();document.getElementById('effective').textContent=(effective*100).toFixed(1)+'%';document.getElementById('takeHome').textContent='$'+Math.round(takeHome).toLocaleString();document.getElementById('brackets').innerHTML=bracket.map(b=>{const rate=b.rate*100;const range=b.max===Infinity?`$${(b.min/1000).toFixed(0)}k+`:`$${(b.min/1000).toFixed(0)}k - $${(b.max/1000).toFixed(0)}k`;return`<div class="flex justify-between ${taxable>b.min?'font-bold text-red-600':''}"><span>${range}</span><span>${rate}%</span></div>`;}).join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
