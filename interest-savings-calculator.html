<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Interest Savings Calculator | Compare Rates</title><meta name="description" content="Free interest savings calculator. Compare loan rates and see potential savings."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/interest-savings-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#10b981 0%,#059669 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-green-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Interest Savings Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Interest Savings Calculator</h1><p class="text-gray-500 mb-6">Compare loan rates and see potential savings.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Loan Amount ($)</label><input type="number" id="principal" placeholder="25000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Loan Term (years)</label><select id="term" class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white"><option value="3">3 years</option><option value="4">4 years</option><option value="5" selected>5 years</option><option value="6">6 years</option><option value="7">7 years</option></select></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Current Rate (%)</label><input type="number" id="currentRate" placeholder="8.5" min="0" max="50" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">New Rate (%)</label><input type="number" id="newRate" placeholder="6.5" min="0" max="50" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Compare Rates</button></form></div>
<div id="results" class="hidden"><div class="bg-green-50 border-2 border-green-500 rounded-xl p-6 mb-6 text-center"><h3 class="font-bold text-green-800 mb-2">Total Interest Savings</h3><p id="savings" class="text-4xl font-bold text-green-600">$0</p></div>
<div class="grid md:grid-cols-2 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4"><h4 class="font-bold text-gray-800 mb-2">Current Rate</h4><p id="currentPayment" class="text-xl font-bold">$0/mo</p><p id="currentInterest" class="text-sm text-gray-500">$0 total interest</p></div><div class="bg-white rounded-xl shadow p-4"><h4 class="font-bold text-gray-800 mb-2">New Rate</h4><p id="newPayment" class="text-xl font-bold text-green-600">$0/mo</p><p id="newInterest" class="text-sm text-gray-500">$0 total interest</p></div></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Monthly Savings</h3><p id="monthlySavings" class="text-2xl font-bold text-green-600">$0/month</p><p id="termSavings" class="text-gray-600"></p></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2026 Finance Calculators Hub</p></div></footer>
<script>function calculatePayment(p,r,n){return p*(r/(1-Math.pow(1+r,-n)));}function calculateInterest(p,r,n){const pmt=calculatePayment(p,r,n);return pmt*n-p;}document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const principal=parseFloat(document.getElementById('principal').value)||0;const term=parseInt(document.getElementById('term').value)||5;const currentRate=parseFloat(document.getElementById('currentRate').value)/100/12||0;const newRate=parseFloat(document.getElementById('newRate').value)/100/12||0;const n=term*12;const currentPayment=calculatePayment(principal,currentRate,n);const newPayment=calculatePayment(principal,newRate,n);const currentInterest=calculateInterest(principal,currentRate,n);const newInterest=calculateInterest(principal,newRate,n);const savings=currentInterest-newInterest;const monthlySavings=currentPayment-newPayment;document.getElementById('results').classList.remove('hidden');document.getElementById('savings').textContent='$'+Math.round(savings).toLocaleString();document.getElementById('currentPayment').textContent='$'+currentPayment.toFixed(2)+'/mo';document.getElementById('currentInterest').textContent='$'+Math.round(currentInterest).toLocaleString()+' total interest';document.getElementById('newPayment').textContent='$'+newPayment.toFixed(2)+'/mo';document.getElementById('newInterest').textContent='$'+Math.round(newInterest).toLocaleString()+' total interest';document.getElementById('monthlySavings').textContent='$'+monthlySavings.toFixed(2)+'/month';document.getElementById('termSavings').textContent='Save $'+Math.round(savings).toLocaleString()+' over '+term+' years';document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
