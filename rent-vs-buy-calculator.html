<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Rent vs Buy Calculator | Should You Rent or Buy?</title><meta name="description" content="Free rent vs buy calculator. Compare the costs of renting vs buying a home."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/rent-vs-buy-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#3b82f6 0%,#1d4ed8 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-blue-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Rent vs Buy Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Rent vs Buy Calculator</h1><p class="text-gray-500 mb-6">Compare the costs of renting vs buying a home.</p>
<form id="calculator-form" class="space-y-4"><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Monthly Rent ($)</label><input type="number" id="rent" placeholder="2000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Home Price ($)</label><input type="number" id="price" placeholder="400000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Down Payment (%)</label><input type="number" id="down" placeholder="20" min="0" max="100" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><div><label class="block text-gray-700 font-semibold mb-1">Mortgage Rate (%)</label><input type="number" id="rate" placeholder="6.5" min="0" max="20" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Property Tax (%/year)</label><input type="number" id="tax" placeholder="1.5" min="0" max="5" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><div><label class="block text-gray-700 font-semibold mb-1">Years in Home</label><input type="number" id="years" placeholder="7" min="1" max="30" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Compare Costs</button></form></div>
<div id="results" class="hidden"><div class="grid md:grid-cols-2 gap-4 mb-6"><div class="bg-blue-50 border-2 border-blue-500 rounded-xl p-4"><h3 class="font-bold text-blue-800 mb-2">🏠 Buy Total Cost</h3><p id="buyCost" class="text-2xl font-bold text-blue-600">$0</p><p id="buyMonthly" class="text-sm text-blue-700">$0/month</p></div><div class="bg-purple-50 border-2 border-purple-500 rounded-xl p-4"><h3 class="font-bold text-purple-800 mb-2">🔑 Rent Total Cost</h3><p id="rentCost" class="text-2xl font-bold text-purple-600">$0</p><p id="rentMonthly" class="text-sm text-purple-700">$0/month</p></div></div>
<div class="bg-green-50 border-2 border-green-500 rounded-xl p-6 mb-6"><h3 class="font-bold text-green-800 mb-2" id="recommendation"></h3><p id="savings" class="text-green-700"></p></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">5-Year Comparison</h3><div id="chart" class="space-y-2"></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const rent=parseFloat(document.getElementById('rent').value)||0;const price=parseFloat(document.getElementById('price').value)||0;const downPct=parseFloat(document.getElementById('down').value)/100||0.2;const rate=parseFloat(document.getElementById('rate').value)/100/12||0;const taxPct=parseFloat(document.getElementById('tax').value)/100/12||0;const years=parseInt(document.getElementById('years').value)||7;const downPayment=price*downPct;const loan=price-downPayment;const n=years*12;const monthlyPayment=loan*rate/(1-Math.pow(1+rate,-n));const propertyTax=price*taxPct;const maintenance=price*0.01/12;const insurance=price*0.003/12;const buyMonthly=monthlyPayment+propertyTax+maintenance+insurance;const buyTotal=downPayment+(buyMonthly*n);const rentTotal=rent*n;const savings=buyTotal-rentTotal;document.getElementById('results').classList.remove('hidden');document.getElementById('buyCost').textContent='$'+Math.round(buyTotal).toLocaleString();document.getElementById('buyMonthly').textContent='$'+Math.round(buyMonthly).toLocaleString()+'/month';document.getElementById('rentCost').textContent='$'+Math.round(rentTotal).toLocaleString();document.getElementById('rentMonthly').textContent='$'+rent.toLocaleString()+'/month';if(savings<0){document.getElementById('recommendation').textContent='🏠 Buying is Better';document.getElementById('savings').textContent='You save $'+Math.abs(Math.round(savings)).toLocaleString()+' by buying.';}else{document.getElementById('recommendation').textContent='🔑 Renting is Better';document.getElementById('savings').textContent='You save $'+Math.round(savings).toLocaleString()+' by renting.';}const chart=[];for(let y=1;y<=Math.min(years,10);y++){const months=y*12;const buyY=downPayment+(buyMonthly*months);const rentY=rent*months;chart.push({year:y,buy:Math.round(buyY),rent:Math.round(rentY)});}document.getElementById('chart').innerHTML=chart.map(c=>'<div class="flex justify-between py-1 border-b"><span>Year '+c.year+'</span><span><span class="text-blue-600">$'+c.buy.toLocaleString()+'</span> vs <span class="text-purple-600">$'+c.rent.toLocaleString()+'</span></span></div>').join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
