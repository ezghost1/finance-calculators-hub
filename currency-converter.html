<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Currency Converter | Exchange Rate Calculator</title><meta name="description" content="Free currency converter. Convert between major world currencies with live exchange rates."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/currency-converter"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#10b981 0%,#059669 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-green-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Currency Converter</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Currency Converter</h1><p class="text-gray-500 mb-6">Convert between major world currencies.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Amount</label><input type="number" id="amount" placeholder="100" min="0" step="0.01" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">From</label><select id="from" class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white"><option value="USD">🇺🇸 USD - US Dollar</option><option value="EUR">🇪🇺 EUR - Euro</option><option value="GBP">🇬🇧 GBP - British Pound</option><option value="JPY">🇯🇵 JPY - Japanese Yen</option><option value="CAD">🇨🇦 CAD - Canadian Dollar</option><option value="AUD">🇦🇺 AUD - Australian Dollar</option><option value="CHF">🇨🇭 CHF - Swiss Franc</option><option value="CNY">🇨🇳 CNY - Chinese Yuan</option><option value="INR">🇮🇳 INR - Indian Rupee</option><option value="MXN">🇲🇽 MXN - Mexican Peso</option><option value="BRL">🇧🇷 BRL - Brazilian Real</option><option value="KRW">🇰🇷 KRW - South Korean Won</option></select></div><div><label class="block text-gray-700 font-semibold mb-1">To</label><select id="to" class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white"><option value="EUR">🇪🇺 EUR - Euro</option><option value="USD">🇺🇸 USD - US Dollar</option><option value="GBP">🇬🇧 GBP - British Pound</option><option value="JPY">🇯🇵 JPY - Japanese Yen</option><option value="CAD">🇨🇦 CAD - Canadian Dollar</option><option value="AUD">🇦🇺 AUD - Australian Dollar</option><option value="CHF">🇨🇭 CHF - Swiss Franc</option><option value="CNY">🇨🇳 CNY - Chinese Yuan</option><option value="INR">🇮🇳 INR - Indian Rupee</option><option value="MXN">🇲🇽 MXN - Mexican Peso</option><option value="BRL">🇧🇷 BRL - Brazilian Real</option><option value="KRW">🇰🇷 KRW - South Korean Won</option></select></div></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Convert</button></form></div>
<div id="results" class="hidden"><div class="bg-green-50 border-2 border-green-500 rounded-xl p-6 mb-6 text-center"><h3 class="font-bold text-green-800 mb-2">Converted Amount</h3><p id="converted" class="text-4xl font-bold text-green-600">0</p><p id="rate" class="text-green-700 mt-2"></p></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Exchange Rates (USD)</h3><div id="rates" class="grid grid-cols-2 md:grid-cols-3 gap-2 text-sm"></div></div>

</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>const rates={USD:1,EUR:0.92,GBP:0.79,JPY:149.50,CAD:1.36,AUD:1.53,CHF:0.88,CNY:7.24,INR:83.12,MXN:17.15,BRL:4.97,KRW:1320};document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const amount=parseFloat(document.getElementById('amount').value)||0;const from=document.getElementById('from').value;const to=document.getElementById('to').value;const usdAmount=amount/rates[from];const result=usdAmount*rates[to];document.getElementById('results').classList.remove('hidden');document.getElementById('converted').textContent=result.toFixed(2)+' '+to;document.getElementById('rate').textContent=`1 ${from} = ${(rates[to]/rates[from]).toFixed(4)} ${to}`;const rateList=Object.entries(rates).filter(([c])=>c!==from).map(([c,r])=>`<div class="p-2 bg-gray-50 rounded"><span class="font-medium">${c}</span><br><span class="text-gray-600">${(r/rates[from]).toFixed(4)}</span></div>`).join('');document.getElementById('rates').innerHTML=rateList;document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
