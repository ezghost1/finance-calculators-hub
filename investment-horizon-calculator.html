<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Investment Horizon Calculator | Time to Goal</title><meta name="description" content="Free investment horizon calculator. Find out how long to reach your financial goals."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/investment-horizon-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#8b5cf6 0%,#6d28d9 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-purple-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Investment Horizon Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Investment Horizon Calculator</h1><p class="text-gray-500 mb-6">Find out how long it takes to reach your financial goals.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Current Savings ($)</label><input type="number" id="current" placeholder="10000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Goal Amount ($)</label><input type="number" id="goal" placeholder="100000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Monthly Contribution ($)</label><input type="number" id="monthly" placeholder="500" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Expected Return (%)</label><input type="number" id="rate" placeholder="7" min="0" max="20" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Time Horizon</button></form></div>
<div id="results" class="hidden"><div class="bg-purple-50 border-2 border-purple-500 rounded-xl p-6 mb-6 text-center"><h3 class="font-bold text-purple-800 mb-2">Time to Reach Goal</h3><p id="time" class="text-4xl font-bold text-purple-600">0 years</p></div>
<div class="grid md:grid-cols-3 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Starting Amount</p><p id="starting" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Total Contributions</p><p id="contributions" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Interest Earned</p><p id="interest" class="text-xl font-bold text-purple-600">$0</p></div></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Milestone Goals</h3><div id="milestones" class="space-y-2"></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2026 Finance Calculators Hub</p></div></footer>
<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const current=parseFloat(document.getElementById('current').value)||0;const goal=parseFloat(document.getElementById('goal').value)||0;const monthly=parseFloat(document.getElementById('monthly').value)||0;const rate=parseFloat(document.getElementById('rate').value)/100/12||0;const needed=goal-current;let balance=current;let months=0;while(balance<goal&&months<600){balance=(balance+monthly)*(1+rate);months++;}const years=Math.floor(months/12);const remainingMonths=months%12;const totalContributions=current+monthly*months;const interest=balance-totalContributions;document.getElementById('results').classList.remove('hidden');document.getElementById('time').textContent=years+' years, '+remainingMonths+' months';document.getElementById('starting').textContent='$'+current.toLocaleString();document.getElementById('contributions').textContent='$'+Math.round(totalContributions).toLocaleString();document.getElementById('interest').textContent='$'+Math.round(interest).toLocaleString();const milestones=[0.25,0.5,0.75,1].map(p=>goal*p);document.getElementById('milestones').innerHTML=milestones.map(m=>{let b=current;let m=0;while(b<m&&m<600){b=(b+monthly)*(1+rate);m++;}return'<div class="flex justify-between py-1 border-b"><span>$'+Math.round(m).toLocaleString()+'</span><span class="font-bold">'+Math.floor(m/12)+'y '+m%12+'m</span></div>';}').join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
