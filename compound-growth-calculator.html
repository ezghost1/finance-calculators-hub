<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Compound Growth Calculator</h1><p class="text-gray-500 mb-6">See how compound interest grows your money exponentially.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Initial Investment ($)</label><input type="number" id="principal" placeholder="10000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Annual Return (%)</label><input type="number" id="rate" placeholder="8" min="0" max="50" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Years</label><input type="number" id="years" placeholder="20" min="1" max="50" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div></div><div><label class="block text-gray-700 font-semibold mb-1">Compounding</label><select id="freq" class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white"><option value="1">Annually</option><option value="4">Quarterly</option><option value="12" selected>Monthly</option><option value="365">Daily</option></select></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Growth</button></form></div>

<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const principal=parseFloat(document.getElementById('principal').value)||0;const rate=parseFloat(document.getElementById('rate').value)/100||0;const years=parseInt(document.getElementById('years').value)||20;const freq=parseInt(document.getElementById('freq').value)||12;const future=principal*Math.pow(1+rate/freq,years*freq);const interest=future-principal;const multiple=future/principal;const timeline=[];for(let y=0;y<=years;y++){const val=principal*Math.pow(1+rate/freq,y*freq);if(y%Math.ceil(years/10)===0||y===years)timeline.push({year:y,value:Math.round(val)});}document.getElementById('results').classList.remove('hidden');document.getElementById('future').textContent='$'+Math.round(future).toLocaleString();document.getElementById('invested').textContent='$'+principal.toLocaleString();document.getElementById('interest').textContent='$'+Math.round(interest).toLocaleString();document.getElementById('multiple').textContent=multiple.toFixed(1)+'x';document.getElementById('timeline').innerHTML=timeline.map(t=>'<div class="flex justify-between py-1 border-b"><span>Year '+t.year+'</span><span class="font-bold">$'+t.value.toLocaleString()+'</span></div>').join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
