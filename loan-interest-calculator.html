<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const principal=parseFloat(document.getElementById('principal').value)||0;const rate=parseFloat(document.getElementById('rate').value)/100/12||0;const years=parseInt(document.getElementById('term').value)||5;const n=years*12;const monthly=principal*rate/(1-Math.pow(1+rate,-n));const totalPaid=monthly*n;const totalInterest=totalPaid-principal;const ratio=totalInterest/principal*100;document.getElementById('results').classList.remove('hidden');document.getElementById('totalInterest').textContent='$'+Math.round(totalInterest).toLocaleString();document.getElementById('monthly').textContent='$'+monthly.toFixed(2);document.getElementById('totalPaid').textContent='$'+Math.round(totalPaid).toLocaleString();document.getElementById('ratio').textContent=ratio.toFixed(1)+'%';const yearly=[];let balance=principal;let totalInt=0;for(let y=1;y<=years;y++){let yearInt=0;let yearPrinc=0;for(let m=0;m<12;m++){const interest=balance*rate;const princ=monthly-interest;balance-=princ;yearInt+=interest;yearPrinc+=princ;}totalInt+=yearInt;yearly.push({year:y,interest:Math.round(yearInt),balance:Math.round(Math.max(0,balance))});}document.getElementById('chart').innerHTML=yearly.map(y=>'<div class="flex justify-between py-1 border-b"><span>Year '+y.year+'</span><span class="text-red-600">$'+y.interest.toLocaleString()+' interest</span></div>').join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
