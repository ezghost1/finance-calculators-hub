<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Discount Calculator | Percent Off Calculator</title><meta name="description" content="Free discount calculator. Calculate sale prices, markdown percentages, and final prices after discounts."><meta name="keywords" content="discount calculator, percent off calculator, sale price calculator, markdown calculator"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/discount-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#ec4899 0%,#db2777 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-pink-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Discount Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Discount Calculator</h1><form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Original Price ($)</label><input type="number" id="price" placeholder="100" min="0" step="0.01" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Discount (%)</label><div class="flex gap-2"><button type="button" onclick="setDiscount(10)" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">10%</button><button type="button" onclick="setDiscount(20)" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">20%</button><button type="button" onclick="setDiscount(30)" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">30%</button><button type="button" onclick="setDiscount(50)" class="px-4 py-2 bg-pink-600 text-white rounded-lg hover:bg-pink-700">50%</button></div><input type="number" id="discount" placeholder="20" min="0" max="100" class="w-full px-4 py-3 border border-gray-300 rounded-lg mt-2" required></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Sale Price</button></form></div>
<div id="results" class="hidden"><div class="bg-pink-50 border-2 border-pink-500 rounded-xl p-6 mb-6"><h3 class="font-bold text-pink-800 mb-2">Final Price</h3><p id="final" class="text-4xl font-bold text-pink-600">$0</p><p id="savings" class="text-pink-700 mt-2"></p></div><div class="grid md:grid-cols-2 gap-4"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">You Save</p><p id="saved" class="text-xl font-bold text-green-600">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Discount Amount</p><p id="amount" class="text-xl font-bold">$0</p></div></div></div>
</main><footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>function setDiscount(pct){document.getElementById('discount').value=pct}document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const price=parseFloat(document.getElementById('price').value)||0;const discount=parseFloat(document.getElementById('discount').value)||0;const saved=price*discount/100;const final=price-saved;document.getElementById('results').classList.remove('hidden');document.getElementById('final').textContent='$'+final.toFixed(2);document.getElementById('savings').textContent='You save $'+saved.toFixed(2)+' ('+discount+'% off)';document.getElementById('saved').textContent='$'+saved.toFixed(2);document.getElementById('amount').textContent='$'+saved.toFixed(2);document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
