<script>let current='0',previous='',op=null;const display=document.getElementById('display');function number(n){if(current==='0'&&n!=='.')current=n;else current+=n;display.value=current;}function operation(o){previous=current;current='0';op=o;}function calculate(){const a=parseFloat(previous),b=parseFloat(current);let result;switch(op){case'+':result=a+b;break;case'-':result=a-b;break;case'*':result=a*b;break;case'/':result=b!==0?a/b:NaN;break;default:return;}current=String(result);op=null;display.value=current;}function clearAll(){current='0';previous='';op=null;display.value='0';}function clearEntry(){current='0';display.value='0';}function backspace(){current=current.slice(0,-1)||'0';display.value=current;}function scientific(f){const n=parseFloat(current)||0;let result;switch(f){case'sqrt':result=Math.sqrt(n);break;case'pow2':result=n*n;break;case'pow3':result=n*n*n;break;case'inv':result=1/n;break;case'sin':result=Math.sin(n*Math.PI/180);break;case'cos':result=Math.cos(n*Math.PI/180);break;case'tan':result=Math.tan(n*Math.PI/180);break;case'log':result=Math.log10(n);break;case'ln':result=Math.log(n);break;case'exp':result=Math.exp(n);break;case'pi':result=Math.PI;break;case'percent':result=n/100;break;default:return;}current=String(result);display.value=current;}</script>
