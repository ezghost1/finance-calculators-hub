<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Savings Calculator | Compound Interest Savings</title><meta name="description" content="Free savings calculator. Calculate how much you can save with compound interest over time."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/savings-interest-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#10b981 0%,#059669 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-green-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Savings Interest Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Savings Interest Calculator</h1><p class="text-gray-500 mb-6">Calculate how your savings grow with compound interest.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Initial Deposit ($)</label><input type="number" id="principal" placeholder="10000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Monthly Contribution ($)</label><input type="number" id="monthly" placeholder="500" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Interest Rate (%)</label><input type="number" id="rate" placeholder="5" min="0" max="100" step="0.01" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Years</label><input type="number" id="years" placeholder="10" min="1" max="50" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div></div><div><label class="block text-gray-700 font-semibold mb-1">Compound Frequency</label><select id="frequency" class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white"><option value="12">Monthly</option><option value="4">Quarterly</option><option value="1">Annually</option><option value="365">Daily</option></select></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Savings</button></form></div>
<div id="results" class="hidden"><div class="bg-green-50 border-2 border-green-500 rounded-xl p-6 mb-6 text-center"><h3 class="font-bold text-green-800 mb-2">Total Savings</h3><p id="total" class="text-4xl font-bold text-green-600">$0</p></div>
<div class="grid md:grid-cols-3 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Total Deposits</p><p id="deposits" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Interest Earned</p><p id="interest" class="text-xl font-bold text-green-600">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Interest Rate</p><p id="rateDisplay" class="text-xl font-bold">0%</p></div></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Growth Over Time</h3><div id="chart" class="space-y-2"></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const principal=parseFloat(document.getElementById('principal').value)||0;const monthly=parseFloat(document.getElementById('monthly').value)||0;const rate=parseFloat(document.getElementById('rate').value)/100||0;const years=parseInt(document.getElementById('years').value)||10;const n=parseInt(document.getElementById('frequency').value)||12;const r=rate/n;const totalMonths=years*12;let balance=principal;let totalDeposits=principal;const yearlyData=[];for(let y=1;y<=years;y++){for(let m=1;m<=12;m++){balance=(balance+monthly)*(1+r/n);totalDeposits+=monthly;}yearlyData.push({year:y,balance:Math.round(balance),interest:Math.round(balance-totalDeposits)});}const totalInterest=balance-totalDeposits;document.getElementById('results').classList.remove('hidden');document.getElementById('total').textContent='$'+Math.round(balance).toLocaleString();document.getElementById('deposits').textContent='$'+Math.round(totalDeposits).toLocaleString();document.getElementById('interest').textContent='$'+Math.round(totalInterest).toLocaleString();document.getElementById('rateDisplay').textContent=rate*100+'%';document.getElementById('chart').innerHTML=yearlyData.filter(d=>d.year%Math.ceil(years/10)===0||d.year===years).map(d=>'<div class="flex justify-between"><span>Year '+d.year+'</span><span class="font-bold">$'+d.balance.toLocaleString()+'</span></div>').join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
