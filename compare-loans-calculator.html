<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-green-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Compare Loans Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Loan Comparison Calculator</h1><p class="text-gray-500 mb-6">Compare multiple loan offers side by side.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Loan Amount ($)</label><input type="number" id="principal" placeholder="30000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div>
<div class="grid md:grid-cols-2 gap-4"><div class="bg-blue-50 p-4 rounded-lg"><h4 class="font-bold text-blue-800 mb-3">Loan A</h4><div><label class="block text-gray-600 text-sm mb-1">Interest Rate (%)</label><input type="number" id="rateA" placeholder="6.5" min="0" max="30" step="0.1" class="w-full px-3 py-2 border border-gray-300 rounded-lg" required></div><div class="mt-2"><label class="block text-gray-600 text-sm mb-1">Term (years)</label><input type="number" id="termA" placeholder="5" min="1" max="30" class="w-full px-3 py-2 border border-gray-300 rounded-lg" required></div></div>
<div class="bg-green-50 p-4 rounded-lg"><h4 class="font-bold text-green-800 mb-3">Loan B</h4><div><label class="block text-gray-600 text-sm mb-1">Interest Rate (%)</label><input type="number" id="rateB" placeholder="5.9" min="0" max="30" step="0.1" class="w-full px-3 py-2 border border-gray-300 rounded-lg" required></div><div class="mt-2"><label class="block text-gray-600 text-sm mb-1">Term (years)</label><input type="number" id="termB" placeholder="5" min="1" max="30" class="w-full px-3 py-2 border border-gray-300 rounded-lg" required></div></div></div>
<button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Compare Loans</button></form></div>
<div id="results" class="hidden"><div class="bg-green-50 border-2 border-green-500 rounded-xl p-6 mb-6"><h3 class="font-bold text-green-800 mb-2">Best Option</h3><p id="best" class="text-2xl font-bold text-green-600"></p><p id="savings" class="text-green-700 mt-2"></p></div>
<div class="grid md:grid-cols-2 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4"><h4 class="font-bold text-blue-800 mb-2">Loan A</h4><p id="paymentA" class="text-xl font-bold">$0/mo</p><p id="totalA" class="text-sm text-gray-500">$0 total</p><p id="interestA" class="text-sm text-blue-600">$0 interest</p></div><div class="bg-white rounded-xl shadow p-4"><h4 class="font-bold text-green-800 mb-2">Loan B</h4><p id="paymentB" class="text-xl font-bold">$0/mo</p><p id="totalB" class="text-sm text-gray-500">$0 total</p><p id="interestB" class="text-sm text-green-600">$0 interest</p></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2026 Finance Calculators Hub</p></div></footer>
<script>function calculate(principal,rate,term){const monthlyRate=rate/100/12;const n=term*12;const payment=principal*monthlyRate/(1-Math.pow(1+monthlyRate,-n));const total=payment*n;const interest=total-principal;return{payment,total,interest};}document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const principal=parseFloat(document.getElementById('principal').value)||0;const rateA=parseFloat(document.getElementById('rateA').value)||0;const termA=parseInt(document.getElementById('termA').value)||5;const rateB=parseFloat(document.getElementById('rateB').value)||0;const termB=parseInt(document.getElementById('termB').value)||5;const loanA=calculate(principal,rateA,termA);const loanB=calculate(principal,rateB,termB);const better=loanA.total<loanB.total?'A':'B';const savings=Math.abs(loanA.total-loanB.total);document.getElementById('results').classList.remove('hidden');document.getElementById('best').textContent='Loan '+better+' saves $'+Math.round(savings).toLocaleString();document.getElementById('savings').textContent='Lower total cost over the loan term';document.getElementById('paymentA').textContent='$'+loanA.payment.toFixed(2)+'/mo';document.getElementById('totalA').textContent='$'+Math.round(loanA.total).toLocaleString()+' total';document.getElementById('interestA').textContent='$'+Math.round(loanA.interest).toLocaleString()+' interest';document.getElementById('paymentB').textContent='$'+loanB.payment.toFixed(2)+'/mo';document.getElementById('totalB').textContent='$'+Math.round(loanB.total).toLocaleString()+' total';document.getElementById('interestB').textContent='$'+Math.round(loanB.interest).toLocaleString()+' interest';document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
