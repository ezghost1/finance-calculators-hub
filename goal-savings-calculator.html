<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Savings Goal Calculator | Reach Your Goals</title><meta name="description" content="Free savings goal calculator. Calculate how much to save each month to reach your goal."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/goal-savings-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-green-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Goal Savings Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Goal Savings Calculator</h1><p class="text-gray-500 mb-6">Calculate how much to save each month to reach your goal.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Savings Goal ($)</label><input type="number" id="goal" placeholder="50000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Current Savings ($)</label><input type="number" id="current" placeholder="5000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Timeframe (months)</label><input type="number" id="months" placeholder="36" min="1" max="600" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Interest Rate (%)</label><input type="number" id="rate" placeholder="4" min="0" max="20" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Savings</button></form></div>
<div id="results" class="hidden"><div class="bg-green-50 border-2 border-green-500 rounded-xl p-6 mb-6 text-center"><h3 class="font-bold text-green-800 mb-2">Monthly Savings Needed</h3><p id="monthly" class="text-4xl font-bold text-green-600">$0</p><p id="goalDisplay" class="text-green-700 mt-2"></p></div>
<div class="grid md:grid-cols-3 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Total Deposits</p><p id="deposits" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Interest Earned</p><p id="interest" class="text-xl font-bold text-green-600">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Time</p><p id="time" class="text-xl font-bold">0 months</p></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const goal=parseFloat(document.getElementById('goal').value)||0;const current=parseFloat(document.getElementById('current').value)||0;const months=parseInt(document.getElementById('months').value)||36;const rate=parseFloat(document.getElementById('rate').value)/100/12||0;const needed=goal-current;let monthly;if(rate>0){monthly=needed*rate/(Math.pow(1+rate,months)-1);}else{monthly=needed/months;}const deposits=monthly*months;const interest=goal-current-deposits;document.getElementById('results').classList.remove('hidden');document.getElementById('monthly').textContent='$'+Math.round(monthly).toLocaleString();document.getElementById('goalDisplay').textContent='to reach $'+goal.toLocaleString();document.getElementById('deposits').textContent='$'+Math.round(deposits).toLocaleString();document.getElementById('interest').textContent='$'+Math.round(Math.max(0,interest)).toLocaleString();document.getElementById('time').textContent=months+' months';document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
