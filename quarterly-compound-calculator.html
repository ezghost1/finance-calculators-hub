<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Quarterly Compound Interest Calculator</title><meta name="description" content="Free quarterly compound interest calculator. Calculate growth with quarterly compounding."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/quarterly-compound-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#8b5cf6 0%,#6d28d9 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-purple-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Quarterly Compound Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Quarterly Compound Interest Calculator</h1><p class="text-gray-500 mb-6">Calculate growth with quarterly compounding.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Principal ($)</label><input type="number" id="principal" placeholder="10000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Annual Rate (%)</label><input type="number" id="rate" placeholder="6" min="0" max="50" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Years</label><input type="number" id="years" placeholder="10" min="1" max="50" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate</button></form></div>
<div id="results" class="hidden"><div class="bg-purple-50 border-2 border-purple-500 rounded-xl p-6 mb-6 text-center"><h3 class="font-bold text-purple-800 mb-2">Future Value</h3><p id="future" class="text-4xl font-bold text-purple-600">$0</p></div>
<div class="grid md:grid-cols-3 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Principal</p><p id="principalDisplay" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Interest Earned</p><p id="interest" class="text-xl font-bold text-purple-600">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Effective Rate</p><p id="effective" class="text-xl font-bold">0%</p></div></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Compare Compounding</h3><div id="compare" class="space-y-2 text-sm"></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2026 Finance Calculators Hub</p></div></footer>
<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const principal=parseFloat(document.getElementById('principal').value)||0;const rate=parseFloat(document.getElementById('rate').value)/100||0;const years=parseInt(document.getElementById('years').value)||10;const quarterly=principal*Math.pow(1+rate/4,years*4);const interest=quarterly-principal;const effectiveRate=Math.pow(1+rate/4,4)-1;const monthly=principal*Math.pow(1+rate/12,years*12);const daily=principal*Math.pow(1+rate/365,years*365);const annual=principal*Math.pow(1+rate,years);document.getElementById('results').classList.remove('hidden');document.getElementById('future').textContent='$'+Math.round(quarterly).toLocaleString();document.getElementById('principalDisplay').textContent='$'+principal.toLocaleString();document.getElementById('interest').textContent='$'+Math.round(interest).toLocaleString();document.getElementById('effective').textContent=(effectiveRate*100).toFixed(2)+'%';document.getElementById('compare').innerHTML='<div class="flex justify-between py-1 border-b"><span>Annual</span><span>$'+Math.round(annual).toLocaleString()+'</span></div>'+'<div class="flex justify-between py-1 border-b"><span>Quarterly</span><span class="font-bold text-purple-600">$'+Math.round(quarterly).toLocaleString()+'</span></div>'+'<div class="flex justify-between py-1 border-b"><span>Monthly</span><span>$'+Math.round(monthly).toLocaleString()+'</span></div>'+'<div class="flex justify-between py-1"><span>Daily</span><span>$'+Math.round(daily).toLocaleString()+'</span></div>';document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
