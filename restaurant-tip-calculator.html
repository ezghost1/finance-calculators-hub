<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tip Calculator | Restaurant Tip & Split</title><meta name="description" content="Free tip calculator. Calculate tips and split bills at restaurants."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/restaurant-tip-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-amber-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Restaurant Tip Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Restaurant Tip Calculator</h1><p class="text-gray-500 mb-6">Calculate tips and split bills easily.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Bill Amount ($)</label><input type="number" id="bill" placeholder="85.50" min="0" step="0.01" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Tip Percentage</label><div class="grid grid-cols-5 gap-2 mb-2"><button type="button" class="tip-btn px-3 py-2 border border-gray-300 rounded hover:bg-amber-50" data-tip="15">15%</button><button type="button" class="tip-btn px-3 py-2 border border-gray-300 rounded hover:bg-amber-50 bg-amber-100" data-tip="18">18%</button><button type="button" class="tip-btn px-3 py-2 border border-gray-300 rounded hover:bg-amber-50" data-tip="20">20%</button><button type="button" class="tip-btn px-3 py-2 border border-gray-300 rounded hover:bg-amber-50" data-tip="22">22%</button><button type="button" class="tip-btn px-3 py-2 border border-gray-300 rounded hover:bg-amber-50" data-tip="25">25%</button></div><input type="number" id="tip" placeholder="18" min="0" max="100" value="18" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Split Between (people)</label><input type="number" id="people" placeholder="2" min="1" max="50" value="1" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Tip</button></form></div>
<div id="results" class="hidden"><div class="bg-amber-50 border-2 border-amber-500 rounded-xl p-6 mb-6 text-center"><h3 class="font-bold text-amber-800 mb-2">Total with Tip</h3><p id="total" class="text-4xl font-bold text-amber-600">$0</p></div>
<div class="grid md:grid-cols-3 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Tip Amount</p><p id="tipAmount" class="text-xl font-bold text-green-600">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Per Person</p><p id="perPerson" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Tip per Person</p><p id="tipPerPerson" class="text-xl font-bold">$0</p></div></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Quick Tip Guide</h3><div class="grid grid-cols-3 gap-2 text-sm"><div class="bg-green-50 p-2 rounded text-center"><p class="font-bold text-green-700">15%</p><p class="text-gray-600">Good</p></div><div class="bg-blue-50 p-2 rounded text-center"><p class="font-bold text-blue-700">18-20%</p><p class="text-gray-600">Standard</p></div><div class="bg-amber-50 p-2 rounded text-center"><p class="font-bold text-amber-700">22-25%</p><p class="text-gray-600">Excellent</p></div></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2026 Finance Calculators Hub</p></div></footer>
<script>document.querySelectorAll('.tip-btn').forEach(btn=>{btn.addEventListener('click',function(){document.querySelectorAll('.tip-btn').forEach(b=>b.classList.remove('bg-amber-100'));this.classList.add('bg-amber-100');document.getElementById('tip').value=this.dataset.tip;});});document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const bill=parseFloat(document.getElementById('bill').value)||0;const tipPct=parseFloat(document.getElementById('tip').value)/100||0;const people=parseInt(document.getElementById('people').value)||1;const tipAmount=bill*tipPct;const total=bill+tipAmount;const perPerson=total/people;const tipPerPerson=tipAmount/people;document.getElementById('results').classList.remove('hidden');document.getElementById('total').textContent='$'+total.toFixed(2);document.getElementById('tipAmount').textContent='$'+tipAmount.toFixed(2);document.getElementById('perPerson').textContent='$'+perPerson.toFixed(2);document.getElementById('tipPerPerson').textContent='$'+tipPerPerson.toFixed(2);document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
