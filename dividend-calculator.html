<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Dividend Calculator</h1><form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Investment Amount ($)</label><input type="number" id="amount" placeholder="10000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Dividend Yield (%)</label><input type="number" id="yield" placeholder="4" min="0" max="50" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Number of Shares</label><input type="number" id="shares" placeholder="100" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Dividend Growth Rate (%)</label><input type="number" id="growth" placeholder="5" min="0" max="50" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><div><label class="block text-gray-700 font-semibold mb-1">Years to Project</label><input type="number" id="years" placeholder="10" min="1" max="50" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div></div><div><label class="flex items-center space-x-2"><input type="checkbox" id="drip" class="w-4 h-4"><span class="text-gray-700">Reinvest dividends (DRIP)</span></label></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Dividends</button></form></div>

<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const amount=parseFloat(document.getElementById('amount').value)||0;const yieldPct=parseFloat(document.getElementById('yield').value)/100||0;const shares=parseFloat(document.getElementById('shares').value)||0;const growth=parseFloat(document.getElementById('growth').value)/100||0;const years=parseInt(document.getElementById('years').value)||10;const drip=document.getElementById('drip').checked;const initialShares=shares||(amount/100);const initialAmount=amount||(shares*100);let balance=initialAmount;let totalDividends=0;const yearlyData=[];for(let y=1;y<=years;y++){const currentYield=yieldPct*Math.pow(1+growth,y-1);const yearlyDividend=balance*currentYield;totalDividends+=yearlyDividend;if(drip){balance+=yearlyDividend;}yearlyData.push({year:y,dividend:yearlyDividend,yield:currentYield*100,total:totalDividends});}const annualDividend=initialAmount*yieldPct;document.getElementById('results').classList.remove('hidden');document.getElementById('annual').textContent='$'+Math.round(annualDividend).toLocaleString();document.getElementById('monthly').textContent='That\'s $'+Math.round(annualDividend/12).toLocaleString()+'/month';document.getElementById('totalDividends').textContent='$'+Math.round(totalDividends).toLocaleString();document.getElementById('yieldOnCost').textContent=(yieldPct*(drip?Math.pow(1+growth,years):1)*100).toFixed(1)+'%';document.getElementById('finalValue').textContent='$'+Math.round(balance).toLocaleString();document.getElementById('yearly-table').innerHTML=yearlyData.slice(0,10).map(r=>`<tr class="border-b hover:bg-gray-50"><td class="p-2">${r.year}</td><td class="p-2">$${Math.round(r.dividend).toLocaleString()}</td><td class="p-2">${r.yield.toFixed(2)}%</td><td class="p-2">$${Math.round(r.total).toLocaleString()}</td></tr>`).join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
