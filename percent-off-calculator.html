<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Percent Off Calculator | Discount & Sale Price</title><meta name="description" content="Free percent off calculator. Calculate sale prices, discounts, and savings instantly."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/percent-off-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#f97316 0%,#ea580c 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-orange-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Percent Off Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Percent Off Calculator</h1><p class="text-gray-500 mb-6">Calculate sale prices and discounts quickly.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Original Price ($)</label><input type="number" id="original" placeholder="100" min="0" step="0.01" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Discount Percentage (%)</label><div class="grid grid-cols-5 gap-2 mb-2"><button type="button" class="disc-btn px-3 py-2 border border-gray-300 rounded hover:bg-orange-50" data-disc="10">10%</button><button type="button" class="disc-btn px-3 py-2 border border-gray-300 rounded hover:bg-orange-50" data-disc="15">15%</button><button type="button" class="disc-btn px-3 py-2 border border-gray-300 rounded hover:bg-orange-50 bg-orange-100" data-disc="20">20%</button><button type="button" class="disc-btn px-3 py-2 border border-gray-300 rounded hover:bg-orange-50" data-disc="25">25%</button><button type="button" class="disc-btn px-3 py-2 border border-gray-300 rounded hover:bg-orange-50" data-disc="50">50%</button></div><input type="number" id="discount" placeholder="20" min="0" max="100" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate</button></form></div>
<div id="results" class="hidden"><div class="bg-orange-50 border-2 border-orange-500 rounded-xl p-6 mb-6"><h3 class="font-bold text-orange-800 mb-2">Sale Price</h3><p id="salePrice" class="text-4xl font-bold text-orange-600">$0</p><p id="savings" class="text-orange-700 mt-2"></p></div>
<div class="grid md:grid-cols-2 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4"><p class="text-gray-500 text-sm">You Save</p><p id="youSave" class="text-2xl font-bold text-green-600">$0</p></div><div class="bg-white rounded-xl shadow p-4"><p class="text-gray-500 text-sm">Discount</p><p id="discResult" class="text-2xl font-bold">0%</p></div></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Quick Discounts</h3><div id="quickDisc" class="grid grid-cols-2 gap-2"></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2026 Finance Calculators Hub</p></div></footer>
<script>document.querySelectorAll('.disc-btn').forEach(btn=>{btn.addEventListener('click',function(){document.querySelectorAll('.disc-btn').forEach(b=>b.classList.remove('bg-orange-100'));this.classList.add('bg-orange-100');document.getElementById('discount').value=this.dataset.disc;});});document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const original=parseFloat(document.getElementById('original').value)||0;const disc=parseFloat(document.getElementById('discount').value)||0;const savings=original*(disc/100);const salePrice=original-savings;document.getElementById('results').classList.remove('hidden');document.getElementById('salePrice').textContent='$'+salePrice.toFixed(2);document.getElementById('savings').textContent='You save $'+savings.toFixed(2)+' ('+disc+'% off)';document.getElementById('youSave').textContent='$'+savings.toFixed(2);document.getElementById('discResult').textContent=disc+'%';const quick=[10,15,20,25,30,40,50,60,70,80];document.getElementById('quickDisc').innerHTML=quick.map(q=>{const s=original*(q/100);const p=original-s;return`<div class="p-2 bg-gray-50 rounded text-center"><span class="font-medium">${q}%</span><br><span class="text-sm text-gray-600">$${p.toFixed(2)}</span></div>`;}).join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
