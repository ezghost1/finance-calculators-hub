<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-red-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Cost of Borrowing Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Cost of Borrowing Calculator</h1><p class="text-gray-500 mb-6">Calculate the true cost of your loan including all fees.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Loan Amount ($)</label><input type="number" id="principal" placeholder="25000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Interest Rate (%)</label><input type="number" id="rate" placeholder="6.5" min="0" max="50" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Loan Term (years)</label><input type="number" id="term" placeholder="5" min="1" max="30" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div></div><div><label class="block text-gray-700 font-semibold mb-1">Origination Fee (%)</label><input type="number" id="origination" placeholder="1" min="0" max="10" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg"><p class="text-gray-400 text-xs mt-1">Typical: 0.5-2% of loan</p></div><div><label class="block text-gray-700 font-semibold mb-1">Other Fees ($)</label><input type="number" id="fees" placeholder="500" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Cost</button></form></div>

<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const principal=parseFloat(document.getElementById('principal').value)||0;const rate=parseFloat(document.getElementById('rate').value)/100/12||0;const term=parseInt(document.getElementById('term').value)||5;const origination=parseFloat(document.getElementById('origination').value)/100||0;const fees=parseFloat(document.getElementById('fees').value)||0;const n=term*12;const monthly=principal*rate/(1-Math.pow(1+rate,-n));const totalPayments=monthly*n;const totalInterest=totalPayments-principal;const originationFee=principal*origination;const totalFees=originationFee+fees;const totalCost=totalInterest+totalFees;document.getElementById('results').classList.remove('hidden');document.getElementById('totalCost').textContent='$'+Math.round(totalCost).toLocaleString();document.getElementById('principalDisplay').textContent='$'+principal.toLocaleString();document.getElementById('interest').textContent='$'+Math.round(totalInterest).toLocaleString();document.getElementById('feesDisplay').textContent='$'+Math.round(totalFees).toLocaleString();document.getElementById('apr').textContent=(parseFloat(document.getElementById('rate').value)+origination).toFixed(2)+'%';document.getElementById('breakdown').innerHTML='<div class="flex justify-between py-1 border-b"><span>Monthly Payment</span><span class="font-bold">$'+monthly.toFixed(2)+'</span></div>'+'<div class="flex justify-between py-1 border-b"><span>Total Payments</span><span class="font-bold">$'+Math.round(totalPayments).toLocaleString()+'</span></div>'+'<div class="flex justify-between py-1 border-b"><span>Total Interest</span><span class="font-bold text-red-600">$'+Math.round(totalInterest).toLocaleString()+'</span></div>'+'<div class="flex justify-between py-1 border-b"><span>Origination Fee</span><span class="font-bold">$'+Math.round(originationFee).toLocaleString()+'</span></div>'+'<div class="flex justify-between py-1 border-b"><span>Other Fees</span><span class="font-bold">$'+Math.round(fees).toLocaleString()+'</span></div>'+'<div class="flex justify-between py-1 font-bold"><span>Total Cost</span><span class="text-red-600">$'+Math.round(totalCost).toLocaleString()+'</span></div>';document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
