<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Loan Comparison Calculator | Compare Multiple Loans</title><meta name="description" content="Free loan comparison calculator. Compare multiple loans side by side and find the best deal."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/loan-comparison-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#3b82f6 0%,#1d4ed8 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-4xl"><nav class="mb-4 text-sm"><a href="/" class="text-blue-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Loan Comparison</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Loan Comparison Calculator</h1><p class="text-gray-500 mb-6">Compare up to 3 loans side by side to find the best deal.</p>
<div class="grid md:grid-cols-3 gap-4 mb-6"><div class="border-2 border-blue-500 rounded-lg p-4"><h3 class="font-bold text-blue-600 mb-3">Loan A</h3><input type="number" id="amountA" placeholder="Amount ($)" class="w-full px-3 py-2 border border-gray-300 rounded mb-2"><input type="number" id="rateA" placeholder="Rate (%)" class="w-full px-3 py-2 border border-gray-300 rounded mb-2"><input type="number" id="termA" placeholder="Term (years)" class="w-full px-3 py-2 border border-gray-300 rounded mb-2"><input type="number" id="feeA" placeholder="Fees ($)" class="w-full px-3 py-2 border border-gray-300 rounded"></div>
<div class="border-2 border-green-500 rounded-lg p-4"><h3 class="font-bold text-green-600 mb-3">Loan B</h3><input type="number" id="amountB" placeholder="Amount ($)" class="w-full px-3 py-2 border border-gray-300 rounded mb-2"><input type="number" id="rateB" placeholder="Rate (%)" class="w-full px-3 py-2 border border-gray-300 rounded mb-2"><input type="number" id="termB" placeholder="Term (years)" class="w-full px-3 py-2 border border-gray-300 rounded mb-2"><input type="number" id="feeB" placeholder="Fees ($)" class="w-full px-3 py-2 border border-gray-300 rounded"></div>
<div class="border-2 border-purple-500 rounded-lg p-4"><h3 class="font-bold text-purple-600 mb-3">Loan C</h3><input type="number" id="amountC" placeholder="Amount ($)" class="w-full px-3 py-2 border border-gray-300 rounded mb-2"><input type="number" id="rateC" placeholder="Rate (%)" class="w-full px-3 py-2 border border-gray-300 rounded mb-2"><input type="number" id="termC" placeholder="Term (years)" class="w-full px-3 py-2 border border-gray-300 rounded mb-2"><input type="number" id="feeC" placeholder="Fees ($)" class="w-full px-3 py-2 border border-gray-300 rounded"></div></div>
<button id="compare" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Compare Loans</button></div>
<div id="results" class="hidden"><div class="bg-blue-50 rounded-xl p-6 mb-6"><h3 class="font-bold text-gray-800 mb-4">Comparison Results</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-100"><tr><th class="p-2 text-left">Metric</th><th class="p-2 text-left text-blue-600">Loan A</th><th class="p-2 text-left text-green-600">Loan B</th><th class="p-2 text-left text-purple-600">Loan C</th></tr></thead><tbody id="table"></tbody></table></div></div>
<div id="winner" class="bg-green-50 border-2 border-green-500 rounded-xl p-6 text-center"><h3 class="font-bold text-green-800 mb-2">Recommended Loan</h3><p id="bestLoan" class="text-2xl font-bold text-green-600"></p><p id="savings" class="text-green-700 mt-2"></p></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2026 Finance Calculators Hub</p></div></footer>
<script>function calcLoan(amount,rate,term,fee){amount=parseFloat(amount)||0;rate=parseFloat(rate)||0;term=parseFloat(term)||0;fee=parseFloat(fee)||0;const monthlyRate=rate/100/12;const months=term*12;const monthly=monthlyRate===0?amount/months:amount*(monthlyRate*Math.pow(1+monthlyRate,months))/(Math.pow(1+monthlyRate,months)-1);const total=monthly*months;const interest=total-amount;return{monthly,total,totalCost:total+fee,interest};}document.getElementById('compare').addEventListener('click',function(){const loans=[{name:'Loan A',amount:document.getElementById('amountA').value,rate:document.getElementById('rateA').value,term:document.getElementById('termA').value,fee:document.getElementById('feeA').value,color:'blue'},{name:'Loan B',amount:document.getElementById('amountB').value,rate:document.getElementById('rateB').value,term:document.getElementById('termB').value,fee:document.getElementById('feeB').value,color:'green'},{name:'Loan C',amount:document.getElementById('amountC').value,rate:document.getElementById('rateC').value,term:document.getElementById('termC').value,fee:document.getElementById('feeC').value,color:'purple'}].filter(l=>l.amount&&l.rate&&l.term);if(loans.length<2){alert('Please fill in at least 2 loans to compare');return;}const results=loans.map(l=>calcLoan(l.amount,l.rate,l.term,l.fee||0));document.getElementById('results').classList.remove('hidden');const rows=[{label:'Monthly Payment',values:results.map(r=>'$'+r.monthly.toFixed(2))},{label:'Total Interest',values:results.map(r=>'$'+r.interest.toFixed(2))},{label:'Total Cost',values:results.map(r=>'$'+r.totalCost.toFixed(2))},{label:'APR Equivalent',values:results.map((r,i)=>((loans[i].rate/100)+(loans[i].fee/loans[i].amount/loans[i].term*100)).toFixed(2)+'%')}];document.getElementById('table').innerHTML=rows.map(r=>`<tr class="border-b"><td class="p-2 font-medium">${r.label}</td>${r.values.map((v,i)=>`<td class="p-2 text-${loans[i].color}-600">${v}</td>`).join('')}</tr>`).join('');const best=results.reduce((min,r,i)=>r.totalCost<results[min].totalCost?i:min,0);const worst=results.reduce((max,r,i)=>r.totalCost>results[max].totalCost?i:max,0);document.getElementById('bestLoan').textContent=loans[best].name;document.getElementById('savings').textContent='Save $'+Math.round(results[worst].totalCost-results[best].totalCost).toLocaleString()+' vs '+loans[worst].name;});</script>
</body></html>
