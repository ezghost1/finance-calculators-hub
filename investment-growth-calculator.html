<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Investment Growth Calculator | Compound Growth</title><meta name="description" content="Free investment growth calculator. See how your investments grow over time with compound interest."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/investment-growth-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#10b981 0%,#059669 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-green-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Investment Growth Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Investment Growth Calculator</h1><p class="text-gray-500 mb-6">See how your investments grow with compound interest.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Initial Investment ($)</label><input type="number" id="initial" placeholder="10000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Monthly Contribution ($)</label><input type="number" id="monthly" placeholder="500" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Annual Return (%)</label><input type="number" id="rate" placeholder="8" min="0" max="50" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Years</label><input type="number" id="years" placeholder="30" min="1" max="50" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Growth</button></form></div>
<div id="results" class="hidden"><div class="bg-green-50 border-2 border-green-500 rounded-xl p-6 mb-6 text-center"><h3 class="font-bold text-green-800 mb-2">Future Value</h3><p id="future" class="text-4xl font-bold text-green-600">$0</p><p id="gain" class="text-green-700 mt-2"></p></div>
<div class="grid md:grid-cols-4 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Invested</p><p id="invested" class="text-lg font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Interest</p><p id="interest" class="text-lg font-bold text-green-600">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Total Gain</p><p id="totalGain" class="text-lg font-bold text-green-600">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Gain %</p><p id="gainPct" class="text-lg font-bold">0%</p></div></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Growth Over Time</h3><div id="chart" class="space-y-2"></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2026 Finance Calculators Hub</p></div></footer>
<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const initial=parseFloat(document.getElementById('initial').value)||0;const monthly=parseFloat(document.getElementById('monthly').value)||0;const rate=parseFloat(document.getElementById('rate').value)/100||0;const years=parseInt(document.getElementById('years').value)||30;const monthlyRate=rate/12;const n=years*12;let balance=initial;let totalContributions=initial;const yearly=[];for(let y=1;y<=years;y++){for(let m=1;m<=12;m++){balance=(balance+monthly)*(1+monthlyRate);totalContributions+=monthly;}yearly.push({year:y,balance:Math.round(balance),contributions:Math.round(totalContributions)});}const totalInterest=balance-totalContributions;const gainPercent=((balance-initial)/initial*100)||((balance/initial-1)*100)||0;document.getElementById('results').classList.remove('hidden');document.getElementById('future').textContent='$'+Math.round(balance).toLocaleString();document.getElementById('gain').textContent='+$'+Math.round(totalInterest).toLocaleString()+' in interest';document.getElementById('invested').textContent='$'+Math.round(totalContributions).toLocaleString();document.getElementById('interest').textContent='$'+Math.round(totalInterest).toLocaleString();document.getElementById('totalGain').textContent='$'+Math.round(balance-initial).toLocaleString();document.getElementById('gainPct').textContent=((balance-initial)/(initial||1)*100).toFixed(0)+'%';document.getElementById('chart').innerHTML=yearly.filter(y=>y.year%Math.ceil(years/10)===0||y.year===years).map(y=>'<div class="flex justify-between"><span>Year '+y.year+'</span><span class="font-bold">$'+y.balance.toLocaleString()+'</span></div>').join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
