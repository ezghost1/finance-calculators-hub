<script>const units={length:['mm','cm','m','km','in','ft','yd','mi'],weight:['mg','g','kg','oz','lb','ton'],temperature:['°C','°F','K'],volume:['ml','l','gal','qt','pt','cup','fl oz'],area:['mm²','cm²','m²','km²','in²','ft²','yd²','acre','ha'],speed:['m/s','km/h','mph','knot','ft/s'],time:['ms','s','min','h','day','week','month','year'],data:['B','KB','MB','GB','TB','PB']};const conversions={length:{mm:1,cm:10,m:1000,km:1000000,in:25.4,ft:304.8,yd:914.4,mi:1609344},weight:{mg:1,g:1000,kg:1000000,oz:28349.5,lb:453592,ton:907185000},temperature:{toC:function(v,u){if(u==='°F')return(v-32)*5/9;if(u==='K')return v-273.15;return v;},fromC:function(v,u){if(u==='°F')return v*9/5+32;if(u==='K')return v+273.15;return v;}},volume:{ml:1,l:1000,gal:3785.41,qt:946.353,pt:473.176,cup:236.588,'fl oz':29.5735},area:{'mm²':1,'cm²':100,'m²':1000000,'km²':1000000000000,'in²':645.16,'ft²':92903,'yd²':836127,acre:4046856422,ha:10000000000},speed:{'m/s':1,'km/h':0.277778,'mph':0.44704,'knot':0.514444,'ft/s':0.3048},time:{ms:1,s:1000,min:60000,h:3600000,day:86400000,week:604800000,month:2629746000,year:31556952000},data:{B:1,KB:1024,MB:1048576,GB:1073741824,TB:1099511627776,PB:1125899906842624}};document.getElementById('category').addEventListener('change',function(){const cat=this.value;const fromUnit=document.getElementById('from-unit');const toUnit=document.getElementById('to-unit');fromUnit.innerHTML='';toUnit.innerHTML='';units[cat].forEach(u=>{fromUnit.innerHTML+='<option value="'+u+'">'+u+'</option>';toUnit.innerHTML+='<option value="'+u+'">'+u+'</option>';});});document.getElementById('category').dispatchEvent(new Event('change'));document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const cat=document.getElementById('category').value;const fromVal=parseFloat(document.getElementById('from-value').value);const fromUnit=document.getElementById('from-unit').value;const toUnit=document.getElementById('to-unit').value;let result;if(cat==='te
