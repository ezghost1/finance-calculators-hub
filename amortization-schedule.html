<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Amortization Schedule | Loan Payment Breakdown</title><meta name="description" content="Free amortization schedule calculator. See how your loan payments break down into principal and interest each month."><meta name="keywords" content="amortization schedule, loan amortization, payment schedule, principal interest breakdown"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/amortization-schedule"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#3b82f6 0%,#1d4ed8 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-4xl"><nav class="mb-4 text-sm"><a href="/" class="text-blue-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Amortization Schedule</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Amortization Schedule Calculator</h1><form id="calculator-form" class="space-y-4"><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Loan Amount ($)</label><input type="number" id="principal" placeholder="200000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Annual Interest Rate (%)</label><input type="number" id="rate" placeholder="6.5" min="0" max="30" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Loan Term (years)</label><input type="number" id="years" placeholder="30" min="1" max="50" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Start Date</label><input type="date" id="startDate" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Generate Schedule</button></form></div>
<div id="results" class="hidden"><div class="grid md:grid-cols-3 gap-4 mb-6"><div class="bg-blue-50 rounded-xl p-4 text-center"><p class="text-gray-500 text-sm">Monthly Payment</p><p id="monthly" class="text-2xl font-bold text-blue-600">$0</p></div><div class="bg-blue-50 rounded-xl p-4 text-center"><p class="text-gray-500 text-sm">Total Interest</p><p id="totalInterest" class="text-2xl font-bold text-red-600">$0</p></div><div class="bg-blue-50 rounded-xl p-4 text-center"><p class="text-gray-500 text-sm">Total Cost</p><p id="totalCost" class="text-2xl font-bold">$0</p></div></div>
<div class="bg-white rounded-xl shadow-lg p-6 overflow-x-auto"><h2 class="font-bold text-gray-800 mb-4">Amortization Schedule</h2><table class="w-full text-sm"><thead class="bg-gray-100"><tr><th class="p-2 text-left">Month</th><th class="p-2 text-left">Payment</th><th class="p-2 text-left">Principal</th><th class="p-2 text-left">Interest</th><th class="p-2 text-left">Balance</th></tr></thead><tbody id="schedule"></tbody></table></div>
<div class="mt-4 text-center"><button id="showMore" class="text-blue-600 hover:underline">Show all months</button></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>let allData=[];let showing=12;document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const principal=parseFloat(document.getElementById('principal').value)||0;const rate=parseFloat(document.getElementById('rate').value)/100/12||0;const years=parseInt(document.getElementById('years').value)||30;const months=years*12;const monthly=rate===0?principal/months:principal*(rate*Math.pow(1+rate,months))/(Math.pow(1+rate,months)-1);let balance=principal;allData=[];for(let i=1;i<=months;i++){const interest=balance*rate;const principalPmt=monthly-interest;balance-=principalPmt;if(balance<0.01)balance=0;allData.push({month:i,payment:monthly,principal:principalPmt,interest:interest,balance:balance});}document.getElementById('results').classList.remove('hidden');document.getElementById('monthly').textContent='$'+monthly.toFixed(2);const totalInterest=monthly*months-principal;document.getElementById('totalInterest').textContent='$'+Math.round(totalInterest).toLocaleString();document.getElementById('totalCost').textContent='$'+Math.round(monthly*months).toLocaleString();showing=12;renderSchedule();document.getElementById('results').scrollIntoView({behavior:'smooth'});});function renderSchedule(){const tbody=document.getElementById('schedule');tbody.innerHTML=allData.slice(0,showing).map(r=>`<tr class="border-b hover:bg-gray-50"><td class="p-2">${r.month}</td><td class="p-2">$${r.payment.toFixed(2)}</td><td class="p-2">$${r.principal.toFixed(2)}</td><td class="p-2">$${r.interest.toFixed(2)}</td><td class="p-2">$${r.balance.toFixed(2)}</td></tr>`).join('');document.getElementById('showMore').textContent=showing>=allData.length?'':'Show all '+allData.length+' months';document.getElementById('showMore').style.display=showing>=allData.length?'none':'inline';}document.getElementById('showMore').addEventListener('click',function(){showing=allData.length;renderSchedule();});</script>
</body></html>
