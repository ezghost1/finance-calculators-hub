<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Age Calculator | Calculate Your Exact Age</title><meta name="description" content="Free age calculator. Calculate your exact age in years, months, days, hours, and minutes from your birthdate."><meta name="keywords" content="age calculator, birthday calculator, how old am I, date of birth calculator"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/age-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-orange-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Age Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Age Calculator</h1><form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Date of Birth</label><input type="date" id="birthdate" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Calculate Age On</label><input type="date" id="asof" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Age</button></form></div>
<div id="results" class="hidden"><div class="bg-orange-50 border-2 border-orange-500 rounded-xl p-6 mb-6"><h3 class="font-bold text-orange-800 mb-2">Your Age</h3><p id="age-years" class="text-4xl font-bold text-orange-600"></p></div><div class="grid md:grid-cols-2 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Years</p><p id="years" class="text-2xl font-bold">0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Months</p><p id="months" class="text-2xl font-bold">0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Days</p><p id="days" class="text-2xl font-bold">0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Total Days</p><p id="total-days" class="text-2xl font-bold">0</p></div></div><div class="bg-white rounded-xl shadow p-6"><h2 class="font-bold text-gray-800 mb-4">Fun Facts</h2><div class="space-y-2"><p id="hours" class="text-gray-600"></p><p id="minutes" class="text-gray-600"></p><p id="seconds" class="text-gray-600"></p><p id="next-birthday" class="text-gray-600"></p></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>document.getElementById('asof').valueAsDate=new Date();document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const birth=new Date(document.getElementById('birthdate').value);const asof=document.getElementById('asof').value?new Date(document.getElementById('asof').value):new Date();let years=asof.getFullYear()-birth.getFullYear();let months=asof.getMonth()-birth.getMonth();let days=asof.getDate()-birth.getDate();if(days<0){months--;days+=new Date(asof.getFullYear(),asof.getMonth(),0).getDate();}if(months<0){years--;months+=12;}const totalDays=Math.floor((asof-birth)/(1000*60*60*24));const totalHours=totalDays*24;const totalMinutes=totalHours*60;const totalSeconds=totalMinutes*60;const nextBirthday=new Date(asof.getFullYear(),birth.getMonth(),birth.getDate());if(nextBirthday<asof)nextBirthday.setFullYear(nextBirthday.getFullYear()+1);const daysUntil=Math.ceil((nextBirthday-asof)/(1000*60*60*24));document.getElementById('results').classList.remove('hidden');document.getElementById('age-years').textContent=years+' years, '+months+' months, '+days+' days';document.getElementById('years').textContent=years;document.getElementById('months').textContent=months;document.getElementById('days').textContent=days;document.getElementById('total-days').textContent=totalDays.toLocaleString();document.getElementById('hours').textContent='Hours lived: '+totalHours.toLocaleString();document.getElementById('minutes').textContent='Minutes lived: '+totalMinutes.toLocaleString();document.getElementById('seconds').textContent='Seconds lived: '+totalSeconds.toLocaleString();document.getElementById('next-birthday').textContent='Days until next birthday: '+daysUntil;document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
