<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Loan Principal Calculator | How Much Can I Borrow?</title><meta name="description" content="Free loan principal calculator. Find out how much you can borrow based on monthly payment."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/loan-principal-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-amber-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Loan Principal Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Loan Principal Calculator</h1><p class="text-gray-500 mb-6">Find out how much you can borrow based on your monthly payment.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Monthly Payment ($)</label><input type="number" id="payment" placeholder="500" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Interest Rate (%)</label><input type="number" id="rate" placeholder="6.5" min="0" max="50" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Loan Term (years)</label><select id="term" class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white"><option value="3">3 years</option><option value="4">4 years</option><option value="5" selected>5 years</option><option value="6">6 years</option><option value="7">7 years</option><option value="15">15 years</option><option value="20">20 years</option><option value="30">30 years</option></select></div></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Principal</button></form></div>
<div id="results" class="hidden"><div class="bg-amber-50 border-2 border-amber-500 rounded-xl p-6 mb-6 text-center"><h3 class="font-bold text-amber-800 mb-2">You Can Borrow</h3><p id="principal" class="text-4xl font-bold text-amber-600">$0</p></div>
<div class="grid md:grid-cols-3 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Monthly Payment</p><p id="paymentDisplay" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Total Interest</p><p id="totalInterest" class="text-xl font-bold text-amber-600">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Total Paid</p><p id="totalPaid" class="text-xl font-bold">$0</p></div></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Compare Terms</h3><div id="compare" class="space-y-2"></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const payment=parseFloat(document.getElementById('payment').value)||0;const rate=parseFloat(document.getElementById('rate').value)/100/12||0;const term=parseInt(document.getElementById('term').value)||5;const n=term*12;const principal=payment*(1-Math.pow(1+rate,-n))/rate;const totalPaid=payment*n;const totalInterest=totalPaid-principal;document.getElementById('results').classList.remove('hidden');document.getElementById('principal').textContent='$'+Math.round(principal).toLocaleString();document.getElementById('paymentDisplay').textContent='$'+payment.toFixed(2);document.getElementById('totalInterest').textContent='$'+Math.round(totalInterest).toLocaleString();document.getElementById('totalPaid').textContent='$'+Math.round(totalPaid).toLocaleString();const terms=[{label:'3 years',months:36},{label:'5 years',months:60},{label:'7 years',months:84},{label:'15 years',months:180},{label:'30 years',months:360}];document.getElementById('compare').innerHTML=terms.map(t=>{const p=payment*(1-Math.pow(1+rate,-t.months))/rate;return'<div class="flex justify-between py-1 border-b"><span>'+t.label+'</span><span class="font-bold">$'+Math.round(p).toLocaleString()+'</span></div>';}).join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
