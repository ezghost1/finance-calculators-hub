<script>function gcd(a,b){return b===0?Math.abs(a):gcd(b,a%b);}function simplify(n,d){const g=gcd(n,d);return{n:n/g,d:d/g};}document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const num1=parseInt(document.getElementById('num1').value)||0;const den1=parseInt(document.getElementById('den1').value)||1;const num2=parseInt(document.getElementById('num2').value)||0;const den2=parseInt(document.getElementById('den2').value)||1;const op=document.getElementById('operation').value;let resultNum,resultDen;if(op==='+'){resultNum=num1*den2+num2*den1;resultDen=den1*den2;}else if(op==='-'){resultNum=num1*den2-num2*den1;resultDen=den1*den2;}else if(op==='*'){resultNum=num1*num2;resultDen=den1*den2;}else{resultNum=num1*den2;resultDen=num2*den1;}const simplified=simplify(resultNum,resultDen);const decimal=resultNum/resultDen;document.getElementById('results').classList.remove('hidden');document.getElementById('result-fraction').innerHTML=simplified.d===1?simplified.n:`${simplified.n}<span class="text-xl">/</span>${simplified.d}`;document.getElementById('result-decimal').textContent='= '+decimal.toFixed(4);document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
