<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Weekly Savings Calculator | Save Every Week</title><meta name="description" content="Free weekly savings calculator. See how weekly savings grow over time."><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/weekly-savings-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-green-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Weekly Savings Calculator</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Weekly Savings Calculator</h1><p class="text-gray-500 mb-6">See how weekly savings grow over time with compound interest.</p>
<form id="calculator-form" class="space-y-4"><div><label class="block text-gray-700 font-semibold mb-1">Weekly Deposit ($)</label><input type="number" id="weekly" placeholder="100" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Annual Interest Rate (%)</label><input type="number" id="rate" placeholder="5" min="0" max="20" step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div><div><label class="block text-gray-700 font-semibold mb-1">Years to Save</label><input type="number" id="years" placeholder="10" min="1" max="50" class="w-full px-4 py-3 border border-gray-300 rounded-lg" required></div></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Savings</button></form></div>
<div id="results" class="hidden"><div class="bg-green-50 border-2 border-green-500 rounded-xl p-6 mb-6 text-center"><h3 class="font-bold text-green-800 mb-2">Future Value</h3><p id="future" class="text-4xl font-bold text-green-600">$0</p></div>
<div class="grid md:grid-cols-3 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Total Deposits</p><p id="deposits" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Interest Earned</p><p id="interest" class="text-xl font-bold text-green-600">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Years</p><p id="yearsDisplay" class="text-xl font-bold">0</p></div></div>
<div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-gray-800 mb-3">Growth Over Time</h3><div id="chart" class="space-y-2"></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const weekly=parseFloat(document.getElementById('weekly').value)||0;const rate=parseFloat(document.getElementById('rate').value)/100/52||0;const years=parseInt(document.getElementById('years').value)||10;const weeks=years*52;const future=weekly*((Math.pow(1+rate,weeks)-1)/rate)*(1+rate);const deposits=weekly*weeks;const interest=future-deposits;document.getElementById('results').classList.remove('hidden');document.getElementById('future').textContent='$'+Math.round(future).toLocaleString();document.getElementById('deposits').textContent='$'+Math.round(deposits).toLocaleString();document.getElementById('interest').textContent='$'+Math.round(interest).toLocaleString();document.getElementById('yearsDisplay').textContent=years+' years';const yearly=[];let balance=0;for(let y=1;y<=years;y++){for(let w=0;w<52;w++){balance=(balance+weekly)*(1+rate);}yearly.push({year:y,balance:Math.round(balance)});}document.getElementById('chart').innerHTML=yearly.filter(y=>y.year%Math.ceil(years/10)===0||y.year===years).map(y=>'<div class="flex justify-between py-1 border-b"><span>Year '+y.year+'</span><span class="font-bold">$'+y.balance.toLocaleString()+'</span></div>').join('');document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
