<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Budget Calculator | Monthly Budget Planner</title><meta name="description" content="Free budget calculator. Plan your monthly budget, track income and expenses, and manage your finances."><meta name="keywords" content="budget calculator, budget planner, monthly budget, expense tracker"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/budget-calculator"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#3b82f6 0%,#1d4ed8 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-4xl"><nav class="mb-4 text-sm"><a href="/" class="text-blue-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Budget Calculator</span></nav>
<h1 class="text-2xl font-bold text-gray-800 mb-6">Monthly Budget Calculator</h1>
<div class="bg-white rounded-xl shadow-lg p-6 mb-6"><h2 class="font-bold text-gray-800 mb-4">Income</h2><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-600 text-sm mb-1">Primary Income</label><input type="number" id="income1" placeholder="Monthly income" class="w-full px-4 py-2 border rounded-lg"></div><div><label class="block text-gray-600 text-sm mb-1">Secondary Income</label><input type="number" id="income2" placeholder="Other income" class="w-full px-4 py-2 border rounded-lg"></div></div><div class="mt-4 bg-blue-50 p-3 rounded-lg">Total Income: <span id="total-income" class="font-bold text-blue-600">$0</span></div></div>
<div class="bg-white rounded-xl shadow-lg p-6 mb-6"><h2 class="font-bold text-gray-800 mb-4">Expenses</h2><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-600 text-sm mb-1">Housing (Rent/Mortgage)</label><input type="number" id="housing" placeholder="0" class="w-full px-4 py-2 border rounded-lg"></div><div><label class="block text-gray-600 text-sm mb-1">Utilities</label><input type="number" id="utilities" placeholder="0" class="w-full px-4 py-2 border rounded-lg"></div><div><label class="block text-gray-600 text-sm mb-1">Food & Groceries</label><input type="number" id="food" placeholder="0" class="w-full px-4 py-2 border rounded-lg"></div><div><label class="block text-gray-600 text-sm mb-1">Transportation</label><input type="number" id="transport" placeholder="0" class="w-full px-4 py-2 border rounded-lg"></div><div><label class="block text-gray-600 text-sm mb-1">Insurance</label><input type="number" id="insurance" placeholder="0" class="w-full px-4 py-2 border rounded-lg"></div><div><label class="block text-gray-600 text-sm mb-1">Debt Payments</label><input type="number" id="debt" placeholder="0" class="w-full px-4 py-2 border rounded-lg"></div><div><label class="block text-gray-600 text-sm mb-1">Entertainment</label><input type="number" id="entertainment" placeholder="0" class="w-full px-4 py-2 border rounded-lg"></div><div><label class="block text-gray-600 text-sm mb-1">Other</label><input type="number" id="other" placeholder="0" class="w-full px-4 py-2 border rounded-lg"></div></div><div class="mt-4 bg-red-50 p-3 rounded-lg">Total Expenses: <span id="total-expenses" class="font-bold text-red-600">$0</span></div></div>
<button id="calculate" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Calculate Budget</button>
<div id="results" class="hidden mt-6"><div class="bg-gray-50 border-2 border-gray-300 rounded-xl p-6 text-center"><h3 class="font-bold text-gray-800 mb-2">Monthly Budget Summary</h3><div class="grid md:grid-cols-3 gap-4 mt-4"><div><p class="text-gray-500">Income</p><p id="income-display" class="text-2xl font-bold text-blue-600">$0</p></div><div><p class="text-gray-500">Expenses</p><p id="expenses-display" class="text-2xl font-bold text-red-600">$0</p></div><div><p class="text-gray-500">Remaining</p><p id="remaining" class="text-2xl font-bold">$0</p></div></div></div><div id="advice" class="mt-4 bg-blue-50 p-4 rounded-lg text-blue-800"></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>const allInputs=document.querySelectorAll('input[type="number"]');allInputs.forEach(i=>{i.addEventListener('input',calculateTotals);});function calculateTotals(){const income=(parseFloat(document.getElementById('income1').value)||0)+(parseFloat(document.getElementById('income2').value)||0);const expenses=['housing','utilities','food','transport','insurance','debt','entertainment','other'].reduce((s,id)=>s+(parseFloat(document.getElementById(id).value)||0),0);document.getElementById('total-income').textContent='$'+income.toLocaleString();document.getElementById('total-expenses').textContent='$'+expenses.toLocaleString();}document.getElementById('calculate').addEventListener('click',function(){const income=(parseFloat(document.getElementById('income1').value)||0)+(parseFloat(document.getElementById('income2').value)||0);const expenses=['housing','utilities','food','transport','insurance','debt','entertainment','other'].reduce((s,id)=>s+(parseFloat(document.getElementById(id).value)||0),0);const remaining=income-expenses;document.getElementById('results').classList.remove('hidden');document.getElementById('income-display').textContent='$'+income.toLocaleString();document.getElementById('expenses-display').textContent='$'+expenses.toLocaleString();document.getElementById('remaining').textContent='$'+remaining.toLocaleString();document.getElementById('remaining').className='text-2xl font-bold '+(remaining>=0?'text-green-600':'text-red-600');const percentage=income>0?(expenses/income*100).toFixed(0):0;let advice='';if(remaining<0){advice='You are spending more than you earn. Cut expenses or increase income.';}else if(remaining<income*0.1){advice='You are spending '+percentage+'% of income. Aim to save at least 10-20%.';}else{advice='Great! You are saving money each month. Consider investing the surplus.';}document.getElementById('advice').textContent=advice;document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
