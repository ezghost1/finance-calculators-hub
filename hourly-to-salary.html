<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hourly to Salary Calculator | Convert Hourly Rate</title><meta name="description" content="Free hourly to salary calculator. Convert hourly wage to annual salary. Compare pay rates."><meta name="keywords" content="hourly to salary, salary converter, wage calculator, annual income calculator"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="canonical" href="https://finance-hub-lilac-psi.vercel.app/hourly-to-salary"><script async src="https://www.googletagmanager.com/gtag/js?id=G-E19EPYJKRK"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-E19EPYJKRK');</script><script src="https://cdn.tailwindcss.com"></script><style>.gradient-bg{background:linear-gradient(135deg,#06b6d4 0%,#0891b2 100%)}</style></head>
<body class="bg-gray-50 min-h-screen"><header class="gradient-bg text-white py-4 shadow-lg"><div class="container mx-auto px-4 flex items-center justify-between"><a href="/" class="flex items-center space-x-2"><div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><span class="text-2xl font-bold">$</span></div><div><div class="text-xl font-bold">Finance Calculators Hub</div></div></a></div></header>
<main class="container mx-auto px-4 py-8 max-w-2xl"><nav class="mb-4 text-sm"><a href="/" class="text-cyan-600 hover:underline">Home</a> <span class="text-gray-400">›</span> <span class="text-gray-600">Hourly to Salary</span></nav>
<div class="bg-white rounded-xl shadow-lg p-6 md:p-8 mb-8"><h1 class="text-2xl font-bold text-gray-800 mb-6">Hourly to Salary Calculator</h1>
<div class="grid md:grid-cols-2 gap-6 mb-6"><button onclick="setMode('hourly')" id="btn-hourly" class="p-4 bg-cyan-100 border-2 border-cyan-500 rounded-lg text-center"><div class="font-bold text-cyan-800">Hourly to Salary</div><div class="text-sm text-cyan-600">Convert hourly rate</div></button><button onclick="setMode('salary')" id="btn-salary" class="p-4 bg-gray-100 border-2 border-gray-300 rounded-lg text-center"><div class="font-bold text-gray-700">Salary to Hourly</div><div class="text-sm text-gray-500">Convert annual salary</div></button></div>
<form id="calculator-form" class="space-y-4"><div id="hourly-input"><label class="block text-gray-700 font-semibold mb-1">Hourly Rate ($)</label><input type="number" id="hourly" placeholder="25" min="0" step="0.01" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><div id="salary-input" class="hidden"><label class="block text-gray-700 font-semibold mb-1">Annual Salary ($)</label><input type="number" id="salary" placeholder="52000" min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg"></div><div class="grid md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-1">Hours per Week</label><input type="number" id="hours" placeholder="40" min="1" max="168" class="w-full px-4 py-3 border border-gray-300 rounded-lg" value="40"></div><div><label class="block text-gray-700 font-semibold mb-1">Weeks per Year</label><input type="number" id="weeks" placeholder="52" min="1" max="52" class="w-full px-4 py-3 border border-gray-300 rounded-lg" value="52"></div></div><button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition">Convert</button></form></div>
<div id="results" class="hidden"><div class="grid md:grid-cols-2 gap-6 mb-6"><div class="bg-cyan-50 border-2 border-cyan-500 rounded-xl p-6 text-center"><h3 class="font-bold text-cyan-800 mb-2">Hourly Rate</h3><p id="hourly-result" class="text-3xl font-bold text-cyan-600">$0</p></div><div class="bg-cyan-50 border-2 border-cyan-500 rounded-xl p-6 text-center"><h3 class="font-bold text-cyan-800 mb-2">Annual Salary</h3><p id="salary-result" class="text-3xl font-bold text-cyan-600">$0</p></div></div><div class="grid md:grid-cols-4 gap-4 mb-6"><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Weekly</p><p id="weekly" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Bi-Weekly</p><p id="biweekly" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">Monthly</p><p id="monthly" class="text-xl font-bold">$0</p></div><div class="bg-white rounded-xl shadow p-4 text-center"><p class="text-gray-500 text-sm">After Tax</p><p id="afterTax" class="text-xl font-bold">$0</p><p class="text-gray-400 text-xs">~22% tax</p></div></div></div>
</main>
<footer class="bg-gray-800 text-gray-300 py-8 mt-12"><div class="container mx-auto px-4 text-center"><p>© 2024 Finance Calculators Hub</p></div></footer>
<script>let mode='hourly';function setMode(m){mode=m;document.getElementById('btn-hourly').className='p-4 rounded-lg text-center border-2 '+(m==='hourly'?'bg-cyan-100 border-cyan-500':'bg-gray-100 border-gray-300');document.getElementById('btn-salary').className='p-4 rounded-lg text-center border-2 '+(m==='salary'?'bg-cyan-100 border-cyan-500':'bg-gray-100 border-gray-300');document.getElementById('hourly-input').classList.toggle('hidden',m!=='hourly');document.getElementById('salary-input').classList.toggle('hidden',m!=='salary');}document.getElementById('calculator-form').addEventListener('submit',function(e){e.preventDefault();const hours=parseFloat(document.getElementById('hours').value)||40;const weeks=parseFloat(document.getElementById('weeks').value)||52;let hourly,salary;if(mode==='hourly'){hourly=parseFloat(document.getElementById('hourly').value)||0;salary=hourly*hours*weeks;}else{salary=parseFloat(document.getElementById('salary').value)||0;hourly=salary/(hours*weeks);}const weekly=hourly*hours;const biweekly=weekly*2;const monthly=salary/12;const afterTax=salary*0.78;document.getElementById('results').classList.remove('hidden');document.getElementById('hourly-result').textContent='$'+hourly.toFixed(2);document.getElementById('salary-result').textContent='$'+Math.round(salary).toLocaleString();document.getElementById('weekly').textContent='$'+Math.round(weekly).toLocaleString();document.getElementById('biweekly').textContent='$'+Math.round(biweekly).toLocaleString();document.getElementById('monthly').textContent='$'+Math.round(monthly).toLocaleString();document.getElementById('afterTax').textContent='$'+Math.round(afterTax).toLocaleString();document.getElementById('results').scrollIntoView({behavior:'smooth'});});</script>
</body></html>
